<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひらがな スケッチブック</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* お絵かき帳のような質感 */
        .sketchbook {
            background-image: 
                radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-amber-50 h-screen flex flex-col items-center p-4 overflow-hidden select-none">

    <h1 class="text-2xl font-black text-orange-400 my-2 tracking-tighter">ひらがな スケッチブック</h1>

    <div class="flex-1 w-full max-w-2xl bg-white rounded-3xl shadow-inner border-4 border-orange-100 p-4 mb-4 flex flex-col sketchbook">
        <textarea id="output" 
            class="w-full h-full bg-transparent text-5xl font-black text-gray-700 leading-relaxed resize-none focus:outline-none"
            placeholder="ここに ひらがなが 出るよ。まちがえたら ここを おして なおしてね。"
            spellcheck="false"></textarea>
    </div>

    <div class="w-full max-w-md flex items-center justify-around mb-8">
        
        <button id="clearBtn" class="w-20 h-20 bg-gray-200 rounded-full flex flex-col items-center justify-center active:scale-90 transition-all">
            <span class="text-2xl">🧹</span>
            <span class="text-[10px] font-bold text-gray-500">けす</span>
        </button>

        <button id="micBtn" class="w-36 h-36 bg-sky-400 border-[10px] border-sky-100 rounded-full shadow-xl flex items-center justify-center active:scale-90 transition-all outline-none">
            <span id="btnLabel" class="text-white text-2xl font-black italic">おしてね</span>
        </button>

        <button id="newLineBtn" class="w-20 h-20 bg-gray-200 rounded-full flex flex-col items-center justify-center active:scale-90 transition-all">
            <span class="text-2xl">⏎</span>
            <span class="text-[10px] font-bold text-gray-500">つぎの行</span>
        </button>
    </div>

    <div id="status" class="text-[10px] text-gray-300 font-mono"></div>

    <script>
        // ★GASのURLを貼り付けてください
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzhJTL1fmXZFnrSzcM-n_N-ahauuOTTurjJyh5vSP1wUZy_x__C6F-J_YrJQm_n4Y-i/exec'; 

        const micBtn = document.getElementById('micBtn');
        const clearBtn = document.getElementById('clearBtn');
        const newLineBtn = document.getElementById('newLineBtn');
        const btnLabel = document.getElementById('btnLabel');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let isRunning = false;

        if (!SpeechRecognition) {
            output.value = "Safariで ひらいてね";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;

            // マイクボタンの動作
            micBtn.onclick = () => {
                if (!isRunning) {
                    try { recognition.start(); } catch(e) {}
                } else {
                    recognition.stop();
                    btnLabel.innerText = "WAIT";
                }
            };

            // 全部消すボタン
            clearBtn.onclick = () => {
                if(confirm("ぜんぶ けして いい？")) {
                    output.value = "";
                }
            };

            // 改行ボタン
            newLineBtn.onclick = () => {
                output.value += "\n";
                output.scrollTop = output.scrollHeight;
            };

            recognition.onstart = () => {
                isRunning = true;
                micBtn.classList.add('bg-red-500', 'border-red-200', 'pulse-red');
                btnLabel.innerText = "おわる";
                status.innerText = "listening...";
            };

            recognition.onresult = (event) => {
                if (event.results[0].isFinal) {
                    const transcript = event.results[0][0].transcript;
                    status.innerText = "converting...";
                    sendToGas(transcript);
                }
            };

            recognition.onend = () => {
                isRunning = false;
                micBtn.classList.remove('bg-red-500', 'border-red-200', 'pulse-red');
                btnLabel.innerText = "おしてね";
                status.innerText = "ready";
            };
        }

        async function sendToGas(text) {
            try {
                const res = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}`);
                const data = await res.json();
                if (data.words) {
                    // 分かち書きせず、そのまま結合して追加
                    const newText = data.words.join('');
                    // 現在のテキストの末尾に追加（または上書きしたい場合は output.value = newText）
                    output.value += newText;
                    // 自動スクロール
                    output.scrollTop = output.scrollHeight;
                } else {
                    console.error(data.error);
                }
            } catch (e) {
                status.innerText = "error";
            }
        }
    </script>
</body>
</html>
