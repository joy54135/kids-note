<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ふりかえり たからばこ v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .sketchbook { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
        .suck-in { transition: all 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045); transform: scale(0) translate(200px, 400px) rotate(20deg) !important; opacity: 0; }
        .modal-bg { background-color: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .step-num { position: absolute; top: -6px; left: -6px; width: 28px; height: 28px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; border: 3px solid currentColor; z-index: 20; }
        #richDisplay { outline: none; min-height: 100%; white-space: pre-wrap; word-break: break-all; }
        .q-block { color: #f97316; font-size: 0.6em; display: block; margin-top: 10px; border-bottom: 2px solid #ffedd5; }
        .photo-thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 12px; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .toggle-btn[data-active="true"] { background-color: #f97316; color: white; }
    </style>
</head>
<body class="bg-amber-50 p-3 select-none">

    <div class="w-full max-w-3xl flex justify-between items-center mb-2 shrink-0 relative z-10">
        <button id="historyBtn" class="bg-white border-2 border-orange-200 rounded-full px-4 py-1 shadow-sm active:scale-90 flex items-center gap-1">
            <span class="text-xl">🎁</span> <span class="text-xs font-black text-orange-400 italic">きろく</span>
        </button>
        
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-orange-400">こえの案内</span>
            <button id="voiceToggle" data-active="true" class="toggle-btn bg-white border-2 border-orange-200 rounded-full px-3 py-1 text-[10px] font-black transition-colors shadow-sm">ON</button>
        </div>

        <select id="gradeMode" class="bg-orange-400 text-white font-black text-xs px-3 py-1 rounded-full border-2 border-white shadow-sm outline-none">
            <option value="0">ひらがな</option>
            <option value="1" selected>1ねんせい</option>
            <option value="2">2ねんせい</option>
            <option value="99">ぜんぶ</option>
        </select>
    </div>

    <div id="canvas" class="flex-1 w-full max-w-3xl bg-white rounded-3xl shadow-inner border-4 border-orange-100 p-6 mb-4 flex flex-col sketchbook relative min-h-0 z-10">
        <div id="stepIndicator" class="text-orange-500 font-black text-sm mb-1 italic"></div>
        <div id="currentQuestionBox" class="text-2xl font-black text-orange-600 mb-2 leading-tight"></div>
        
        <div id="outputContainer" class="flex-1 overflow-y-auto min-h-0 border-t-2 border-orange-50 pt-2">
             <div id="richDisplay" class="text-4xl font-black text-gray-700 leading-tight w-full"></div>
        </div>
        
        <div id="photoPreview" class="flex gap-2 py-2 shrink-0 mt-2"></div>
        <div id="kanjiDisplay" class="hidden"></div>
    </div>

    <div class="w-full max-w-4xl flex flex-col gap-3 shrink-0 relative z-20">
        <div class="grid grid-cols-4 gap-2">
            <button id="micBtn" class="relative bg-sky-400 border-4 border-sky-100 rounded-2xl py-4 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <div class="step-num text-sky-400">1</div>
                <span id="label-mic" class="text-xl font-black italic">おしてね</span>
                <span class="text-[10px] font-bold opacity-80 uppercase">お話しする</span>
            </button>
            <button id="listenBtn" class="relative bg-green-400 border-4 border-green-100 rounded-2xl py-4 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <div class="step-num text-green-400">2</div>
                <span class="text-2xl">📢</span>
                <span class="text-[10px] font-black italic">きいてみる</span>
            </button>
            <button id="cameraBtn" class="relative bg-sky-500 border-4 border-sky-200 rounded-2xl py-4 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <div class="step-num text-sky-500">3</div>
                <span class="text-2xl">📷</span>
                <span class="text-[10px] font-black italic">しゃしん</span>
                <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
            </button>
            <button id="saveBtn" class="relative bg-orange-400 border-4 border-orange-100 rounded-2xl py-4 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <div class="step-num text-orange-400">4</div>
                <span class="text-2xl" id="saveIcon">➡️</span>
                <span id="label-save" class="text-[10px] font-black">つぎへ</span>
            </button>
        </div>

        <div class="grid grid-cols-4 gap-2 px-1 pb-3">
            <button id="backStepBtn" class="bg-white border-2 border-orange-200 rounded-xl py-2 active:bg-orange-50 flex items-center justify-center gap-1 shadow-sm">
                <span class="text-lg">⬅️</span><span class="text-[10px] font-black text-orange-400">もどる</span>
            </button>
            <button id="backspaceBtn" class="bg-white border-2 border-gray-100 rounded-xl py-2 active:bg-gray-100 flex items-center justify-center gap-1 shadow-sm text-gray-400">
                <span class="text-lg">⌫</span><span class="text-[10px] font-black">1字けす</span>
            </button>
            <button id="clearBtn" class="bg-white border-2 border-gray-100 rounded-xl py-2 active:bg-gray-100 flex items-center justify-center gap-1 shadow-sm text-gray-300">
                <span class="text-lg">🧹</span><span class="text-[10px] font-black">全部消す</span>
            </button>
            <button id="newLineBtn" class="bg-white border-2 border-gray-100 rounded-xl py-2 active:bg-gray-100 flex items-center justify-center gap-1 shadow-sm text-gray-300">
                <span class="text-lg">⏎</span><span class="text-[10px] font-black">改行</span>
            </button>
        </div>
    </div>

    <div id="subjectModal" class="hidden modal-bg" onclick="if(event.target===this) closeModal('subjectModal')">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-3xl font-black text-orange-400 mb-8 text-center italic">どの きょうか？</h2>
            <div id="subjectGrid" class="grid grid-cols-2 gap-4 max-h-[50vh] overflow-y-auto p-1"></div>
            <button onclick="closeModal('subjectModal')" class="w-full mt-8 text-gray-400 text-lg font-bold">やめる</button>
        </div>
    </div>

    <div id="confirmModal" class="hidden modal-bg">
        <div class="bg-white rounded-3xl p-10 w-full max-w-sm shadow-2xl text-center border-8 border-orange-100">
            <p id="confirmText" class="text-3xl font-black text-gray-700 mb-10 leading-relaxed italic"></p>
            <div class="flex gap-4">
                <button onclick="closeModal('confirmModal')" class="flex-1 bg-gray-100 py-5 rounded-2xl text-2xl font-bold text-gray-400">いいえ</button>
                <button id="execSave" class="flex-1 bg-orange-500 py-5 rounded-2xl text-2xl font-black text-white shadow-lg">はい！</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxE14tNshFIqZHwzhyGQtRDeSazD9aPex9Tm0gIGJjmUvd8jAiFN-bkQyNIt_D9cV_/exec';
        const QUESTIONS = [
            "①きょうの めあて",
            "②できたこと、うまくいったこと",
            "③むずかしかったこと",
            "④つぎに やってみたいこと"
        ];
        
        let currentStep = 0;
        let voiceEnabled = true;
        let masterData = []; // {s: 'text', f: 'reading', step: 0, isQ: false}
        let attachedImages = [];
        let isRunning = false;
        let lastCursorPosition = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        }
        const sfx = { click: () => playSfx(600, 'sine', 0.1), pop: () => playSfx(800, 'sine', 0.1), save: () => playSfx(1200, 'sine', 0.5) };

        const ricDisplay = document.getElementById('richDisplay');
        const kanjiDisplay = document.getElementById('kanjiDisplay');
        const gradeMode = document.getElementById('gradeMode');
        const voiceToggle = document.getElementById('voiceToggle');

        voiceToggle.onclick = () => {
            voiceEnabled = !voiceEnabled;
            voiceToggle.innerText = voiceEnabled ? "ON" : "OFF";
            voiceToggle.dataset.active = voiceEnabled;
            sfx.click();
        };

        function speak(text) {
            if (!voiceEnabled) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ja-JP'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function initStep() {
            document.getElementById('stepIndicator').innerText = `STEP ${currentStep + 1} / 4`;
            document.getElementById('currentQuestionBox').innerText = QUESTIONS[currentStep];
            document.getElementById('label-save').innerText = (currentStep === 3) ? "ほぞんする" : "つぎへ";
            document.getElementById('saveIcon').innerText = (currentStep === 3) ? "💰" : "➡️";
            speak(QUESTIONS[currentStep]);
            renderDisplay();
        }

        function renderDisplay() {
            const lv = parseInt(gradeMode.value);
            let html = "";
            let fullText = "";
            
            masterData.forEach(item => {
                if (item.isQ) {
                    html += `<span class="q-block">${item.s}</span>`;
                } else {
                    if (item.s === "\n") html += "<br>";
                    else html += (lv === 0) ? (item.f || item.s) : item.s;
                }
                fullText += item.s;
            });
            ricDisplay.innerHTML = html;
            kanjiDisplay.innerText = fullText;
            ricDisplay.scrollTop = ricDisplay.scrollHeight;
        }

        // 次のステップへ
        document.getElementById('saveBtn').onclick = () => {
            sfx.click();
            if (currentStep < 3) {
                // 質問文を履歴として追加
                const qText = "\n【" + QUESTIONS[currentStep].split(' ')[1] + "】\n";
                qText.split('').forEach(c => masterData.push({s: c, f: '', isQ: true}));
                currentStep++;
                initStep();
            } else {
                if(kanjiDisplay.innerText.trim()) openSubjectModal(false);
            }
        };

        // もどるボタン
        document.getElementById('backStepBtn').onclick = () => {
            sfx.pop();
            if (currentStep > 0) {
                currentStep--;
                // 前の回答を消す場合はここでmasterDataをフィルタリングする等の処理
                initStep();
            }
        };

        // 音声認識
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const rec = new SpeechRecognition(); rec.lang = 'ja-JP'; rec.interimResults = true;
            document.getElementById('micBtn').onclick = () => {
                sfx.click();
                if (!isRunning) { lastCursorPosition = masterData.length; rec.start(); } else { rec.stop(); }
            };
            rec.onstart = () => { isRunning = true; document.getElementById('micBtn').classList.add('bg-red-500', 'pulse-red'); };
            rec.onresult = (e) => {
                let final = ''; for (let i = e.resultIndex; i < e.results.length; i++) if (e.results[i].isFinal) final += e.results[i][0].transcript;
                if (final) sendToGas(final);
            };
            rec.onend = () => { isRunning = false; document.getElementById('micBtn').classList.remove('bg-red-500', 'pulse-red'); };
        }

        async function sendToGas(text) {
            try {
                const res = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}`);
                const d = await res.json();
                if (d.words_all) {
                    d.words_all.forEach(w => {
                        for (let i=0; i<w.surface.length; i++) {
                            masterData.push({s: w.surface[i], f: i === 0 ? w.furigana : "", isQ: false});
                        }
                    });
                    renderDisplay();
                }
            } catch (e) {}
        }

        // 写真・再生・クリアなどの基本機能はv52を継承
        document.getElementById('cameraBtn').onclick = () => { sfx.click(); document.getElementById('fileInput').click(); };
        document.getElementById('listenBtn').onclick = () => { sfx.click(); speak(kanjiDisplay.innerText || "なにか お話ししてね"); };
        document.getElementById('backspaceBtn').onclick = () => { if(masterData.length > 0 && !masterData[masterData.length-1].isQ) { masterData.pop(); renderDisplay(); } };
        document.getElementById('clearBtn').onclick = () => { if(confirm("ぜんぶ 消す？")) { location.reload(); } };

        // 起動
        window.onload = () => {
            // 最初の質問文をセット
            const qText = "【" + QUESTIONS[0].split(' ')[1] + "】\n";
            qText.split('').forEach(c => masterData.push({s: c, f: '', isQ: true}));
            initStep();
        };

        // モーダル・保存処理（中略、v52と同等）
        function openSubjectModal(forHistory) {
            sfx.pop(); const grid = document.getElementById('subjectGrid'); grid.innerHTML = "";
            ["国語", "算数", "生活", "音楽", "図工", "体育", "道徳"].forEach(s => {
                const btn = document.createElement('button');
                btn.className = "p-5 rounded-2xl font-black text-white bg-orange-400";
                btn.innerText = s; btn.onclick = () => {
                    window.selectedSubj = s;
                    document.getElementById('confirmText').innerText = s + "に ほぞん する？";
                    document.getElementById('subjectModal').classList.add('hidden');
                    document.getElementById('confirmModal').classList.remove('hidden');
                };
                grid.appendChild(btn);
            });
            document.getElementById('subjectModal').classList.remove('hidden');
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        document.getElementById('execSave').onclick = () => {
            sfx.save();
            const hist = JSON.parse(localStorage.getItem('furiHistory') || '[]');
            hist.unshift({ date: new Date().toLocaleString(), subject: window.selectedSubj, text: kanjiDisplay.innerText });
            localStorage.setItem('furiHistory', JSON.stringify(hist));
            alert("たからばこに いれたよ！");
            location.reload();
        };
    </script>
</body>
</html>
