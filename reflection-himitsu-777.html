<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひらがな めがね</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pop {
            0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
            70% { transform: scale(1.1) rotate(2deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        .word-card { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 30px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-amber-50 h-screen flex flex-col items-center justify-between p-6 overflow-hidden select-none">

    <h1 class="text-3xl font-black text-orange-400 mt-4">ひらがな めがね3</h1>

    <div id="display" class="flex flex-wrap justify-center gap-4 w-full h-2/3 content-center text-center">
        <p id="msg" class="text-xl text-orange-300 font-bold px-4">ボタンを おしてね</p>
        <div id="debug-error" class="text-xs text-red-400 mt-2 block w-full"></div>
    </div>

    <div class="mb-12 relative">
        <button id="micBtn" class="w-44 h-44 bg-sky-400 border-[12px] border-sky-100 rounded-full shadow-2xl flex items-center justify-center active:scale-95 transition-all outline-none">
            <span id="btnLabel" class="text-white text-2xl font-black italic">おしてね</span>
        </button>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxIkQrm99FoJY9pFujo0dxjOdosRLQhjP6THgFQJzSWUok-Fj6Ebua-ZFMYIYdmsOVE/exec';
        const sounds = {
            start: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            stop: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            success: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3')
        };

        const micBtn = document.getElementById('micBtn');
        const btnLabel = document.getElementById('btnLabel');
        const msg = document.getElementById('msg');
        const debugErr = document.getElementById('debug-error');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let isRunning = false;
        let isDebouncing = false; // 連打防止フラグ

        if (!SpeechRecognition) {
            msg.innerText = "Safariで ひらいてね";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = false; 
            recognition.continuous = false;

            micBtn.onclick = () => {
                if (isDebouncing) return; // 0.5秒以内の連打は無視
                
                isDebouncing = true;
                setTimeout(() => { isDebouncing = false; }, 500);

                if (!isRunning) {
                    // --- 開始処理 ---
                    debugErr.innerText = "";
                    sounds.start.play().catch(() => {});
                    try {
                        recognition.start();
                    } catch(e) {
                        debugErr.innerText = "もういちど おしてね";
                    }
                } else {
                    // --- 手動終了処理 ---
                    sounds.stop.play().catch(() => {});
                    recognition.stop(); // 録音を止めて結果待ちに移行
                    btnLabel.innerText = "おわり";
                }
            };

            recognition.onstart = () => {
                isRunning = true;
                micBtn.classList.add('bg-red-500', 'border-red-200', 'pulse-red');
                micBtn.classList.remove('bg-sky-400', 'border-sky-100');
                btnLabel.innerText = "おわる";
                msg.innerText = "おわるときは もういちど おしてね";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                msg.innerText = "「" + transcript + "」を かんがえちゅう...";
                sendToGas(transcript);
            };

            recognition.onerror = (event) => {
                if (event.error !== 'no-speech' && event.error !== 'aborted') {
                    debugErr.innerText = "エラー: " + event.error;
                }
            };

            recognition.onend = () => {
                isRunning = false;
                micBtn.classList.remove('bg-red-500', 'border-red-200', 'pulse-red');
                micBtn.classList.add('bg-sky-400', 'border-sky-100');
                btnLabel.innerText = "おしてね";
                if (msg.innerText.includes("はなしてみてね")) {
                    msg.innerText = "ボタンを おしてね";
                }
            };
        }

        async function sendToGas(text) {
            try {
                const targetUrl = `${GAS_URL}?text=${encodeURIComponent(text)}`;
                const res = await fetch(targetUrl);
                const data = await res.json();
                if (data.words) {
                    renderWords(data.words);
                    sounds.success.play().catch(() => {});
                    msg.innerText = "";
                }
            } catch (e) {
                debugErr.innerText = "GASのURLは あってるかな？";
            }
        }

        function renderWords(words) {
            const display = document.getElementById('display');
            display.innerHTML = '';
            words.forEach((word, i) => {
                const card = document.createElement('div');
                card.className = 'word-card bg-white border-b-8 border-orange-100 rounded-3xl p-6 shadow-xl m-2';
                card.innerHTML = `<span class="text-6xl font-black text-gray-700">${word}</span>`;
                card.style.animationDelay = `${i * 0.1}s`;
                display.appendChild(card);
            });
        }
    </script>
</body>
</html>
