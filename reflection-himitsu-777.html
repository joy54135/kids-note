<body class="bg-amber-50 h-screen flex flex-col items-center justify-between p-6 overflow-hidden select-none">
    <h1 class="text-3xl font-black text-orange-400 mt-4">ひらがな めがね2</h1>

    <div id="display" class="flex flex-wrap justify-center gap-4 w-full h-2/3 content-center text-center">
        <p id="msg" class="text-xl text-orange-300 font-bold px-4">ボタンを おして はなしてね</p>
        <div id="debug-error" class="text-xs text-red-400 mt-2"></div>
    </div>

    <div class="mb-12 relative">
        <button id="micBtn" class="w-44 h-44 bg-sky-400 border-[12px] border-sky-100 rounded-full shadow-2xl flex items-center justify-center active:scale-95 transition-all outline-none">
            <span id="btnLabel" class="text-white text-2xl font-black">おしてね</span>
        </button>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxIkQrm99FoJY9pFujo0dxjOdosRLQhjP6THgFQJzSWUok-Fj6Ebua-ZFMYIYdmsOVE/exec';
        const sounds = {
            start: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            success: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3')
        };

        const micBtn = document.getElementById('micBtn');
        const btnLabel = document.getElementById('btnLabel');
        const msg = document.getElementById('msg');
        const debugErr = document.getElementById('debug-error');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            msg.innerText = "iPadのSafariで ひらいてね";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true; // 途中の言葉も表示（反応を良くする）
            recognition.continuous = false;

            micBtn.onclick = () => {
                debugErr.innerText = "";
                try { recognition.start(); } catch(e) { console.log(e); }
            };

            recognition.onstart = () => {
                sounds.start.play();
                micBtn.classList.add('bg-red-500', 'border-red-200', 'pulse-red');
                btnLabel.innerText = "きいてるよ";
                msg.innerText = "「おはよう」とか はなしてみてね";
            };

            // 途中経過の表示
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                msg.innerText = "「" + transcript + "」...";
                
                // 確定した場合のみGASへ送信
                if (event.results[0].isFinal) {
                    msg.innerText = "「" + transcript + "」を かんがえちゅう...";
                    sendToGas(transcript);
                }
            };

            recognition.onerror = (event) => {
                debugErr.innerText = "エラー: " + event.error;
                if (event.error === 'not-allowed') msg.innerText = "マイクを きょか してね";
            };

            recognition.onend = () => {
                micBtn.classList.remove('bg-red-500', 'border-red-200', 'pulse-red');
                btnLabel.innerText = "おしてね";
            };
        }

        async function sendToGas(text) {
            try {
                const targetUrl = `${GAS_URL}?text=${encodeURIComponent(text)}`;
                const res = await fetch(targetUrl);
                const data = await res.json();
                if (data.words) {
                    renderWords(data.words);
                    sounds.success.play();
                    msg.innerText = "";
                }
            } catch (e) {
                debugErr.innerText = "GASにつながらないよ: " + e;
            }
        }

        function renderWords(words) {
            const display = document.getElementById('display');
            display.innerHTML = '';
            words.forEach((word, i) => {
                const card = document.createElement('div');
                card.className = 'word-card bg-white border-b-8 border-orange-100 rounded-3xl p-6 shadow-xl m-2';
                card.innerHTML = `<span class="text-6xl font-black text-gray-700">${word}</span>`;
                card.style.animationDelay = `${i * 0.1}s`;
                display.appendChild(card);
            });
        }
    </script>
</body>
