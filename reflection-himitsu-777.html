<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひらがな めがね Ver.4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ひらがなカードが弾むアニメーション */
        @keyframes pop {
            0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
            70% { transform: scale(1.1) rotate(2deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        .word-card { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        /* 録音中の赤い波紋 */
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 30px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-[#FFFDF0] h-screen flex flex-col items-center justify-between p-6 overflow-hidden select-none">

    <h1 class="text-3xl font-black text-orange-400 mt-4 tracking-widest">ひらがな めがね</h1>

    <div id="display-container" class="flex-1 w-full flex flex-col items-center justify-center">
        <div id="display" class="flex flex-wrap justify-center gap-4 w-full content-center text-center">
            <p id="msg" class="text-2xl text-orange-300 font-bold px-4">したの ボタンを おしてね</p>
        </div>
        <div id="status-bar" class="mt-4 text-xs font-mono text-gray-400"></div>
    </div>

    <div class="mb-12 relative flex flex-col items-center">
        <button id="micBtn" class="w-44 h-44 bg-sky-400 border-[12px] border-sky-100 rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-all outline-none">
            <span id="btnLabel" class="text-white text-3xl font-black italic">おしてね</span>
        </button>
        <div id="error-log" class="absolute -bottom-8 text-xs text-red-400 font-bold whitespace-nowrap"></div>
    </div>

    <script>
        // --- 設定 (ここを書き換えてください) ---
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxtAeXcLqUk7UukAAUeEZ15CcrtkKPhyfVqp8u20cpaEYQAY-7S2cDD1Ls2m5XzrAnu/exec';
        
        const sounds = {
            start: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            stop: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            success: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3')
        };

        const micBtn = document.getElementById('micBtn');
        const btnLabel = document.getElementById('btnLabel');
        const msg = document.getElementById('msg');
        const statusBar = document.getElementById('status-bar');
        const errorLog = document.getElementById('error-log');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let isRunning = false;
        let isDebouncing = false;

        if (!SpeechRecognition) {
            msg.innerText = "Safariで ひらいてね";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true; // 途中の言葉も表示して「反応してる感」を出す
            recognition.continuous = false;

            micBtn.onclick = () => {
                if (isDebouncing) return;
                isDebouncing = true;
                setTimeout(() => { isDebouncing = false; }, 600);

                if (!isRunning) {
                    startProcess();
                } else {
                    stopProcess();
                }
            };

            function startProcess() {
                errorLog.innerText = "";
                statusBar.innerText = "マイクを 準備中...";
                sounds.start.play().catch(() => {});
                try {
                    recognition.start();
                } catch(e) {
                    errorLog.innerText = "エラー: もう一度おしてね";
                }
            }

            function stopProcess() {
                sounds.stop.play().catch(() => {});
                recognition.stop();
                btnLabel.innerText = "おわり";
            }

            recognition.onstart = () => {
                isRunning = true;
                micBtn.classList.add('bg-red-500', 'border-red-200', 'pulse-red');
                micBtn.classList.remove('bg-sky-400', 'border-sky-100');
                btnLabel.innerText = "おわる";
                msg.innerText = "なにか はなしてみてね！";
                statusBar.innerText = "きいています...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const isFinal = event.results[0].isFinal;
                
                // 途中経過をリアルタイム表示
                msg.innerText = "「" + transcript + "」...";
                
                if (isFinal) {
                    msg.innerText = "「" + transcript + "」を ひらがなにするよ...";
                    statusBar.innerText = "GASへ 送信中...";
                    sendToGas(transcript);
                }
            };

            recognition.onerror = (event) => {
                isRunning = false;
                if (event.error === 'no-speech') {
                    errorLog.innerText = "こえが きこえなかったよ";
                } else if (event.error === 'aborted') {
                    // 何もしない（手動停止時に出るため）
                } else {
                    errorLog.innerText = "エラー: " + event.error;
                }
            };

            recognition.onend = () => {
                isRunning = false;
                micBtn.classList.remove('bg-red-500', 'border-red-200', 'pulse-red');
                micBtn.classList.add('bg-sky-400', 'border-sky-100');
                btnLabel.innerText = "おしてね";
                if (msg.innerText.includes("はなしてみてね")) {
                    msg.innerText = "したの ボタンを おしてね";
                    statusBar.innerText = "";
                }
            };
        }

        async function sendToGas(text) {
            try {
                const targetUrl = `${GAS_URL}?text=${encodeURIComponent(text)}`;
                const res = await fetch(targetUrl);
                const data = await res.json();
                
                if (data.words) {
                    statusBar.innerText = "ひらがな 成功！";
                    renderWords(data.words);
                    sounds.success.play().catch(() => {});
                    msg.innerText = "";
                } else {
                    statusBar.innerText = "GASの 返信エラー";
                }
            } catch (e) {
                statusBar.innerText = "通信エラー: " + e.message;
                errorLog.innerText = "ネットが つながらないよ";
            }
        }

        function renderWords(words) {
            const display = document.getElementById('display');
            display.innerHTML = '';
            words.forEach((word, i) => {
                const card = document.createElement('div');
                card.className = 'word-card bg-white border-b-8 border-orange-100 rounded-3xl p-6 shadow-xl m-2';
                card.innerHTML = `<span class="text-6xl font-black text-gray-700 leading-none">${word}</span>`;
                card.style.animationDelay = `${i * 0.1}s`;
                display.appendChild(card);
            });
        }
    </script>
</body>
</html>
