<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひらがな めがね</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pop {
            0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
            70% { transform: scale(1.1) rotate(2deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        .word-card { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .pulse-red { animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-amber-50 h-screen flex flex-col items-center justify-between p-6 overflow-hidden select-none">

    <h1 class="text-3xl font-black text-orange-400 mt-4">ひらがな めがね</h1>

    <div id="display" class="flex flex-wrap justify-center gap-4 w-full h-2/3 content-center">
        <p id="msg" class="text-xl text-orange-200 font-bold">ボタンを おして はなしてね</p>
    </div>

    <div class="mb-12 relative">
        <button id="micBtn" class="w-44 h-44 bg-sky-400 border-[12px] border-sky-100 rounded-full shadow-2xl flex items-center justify-center active:scale-95 transition-all outline-none">
            <span id="btnLabel" class="text-white text-2xl font-black">おしてね</span>
        </button>
    </div>

    <script>
        // --- 設定 ---
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxIkQrm99FoJY9pFujo0dxjOdosRLQhjP6THgFQJzSWUok-Fj6Ebua-ZFMYIYdmsOVE/exec';
        const sounds = {
            start: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            success: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3')
        };

        const micBtn = document.getElementById('micBtn');
        const btnLabel = document.getElementById('btnLabel');
        const display = document.getElementById('display');
        const msg = document.getElementById('msg');

        // 音声認識のセットアップ
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("このiPadは対応していません。Safariでひらいてね。");
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';

            micBtn.onclick = () => {
                if (GAS_URL.includes('ここに')) return alert('GASのURLをセットしてね！');
                try { recognition.start(); } catch(e) {}
            };

            recognition.onstart = () => {
                sounds.start.play();
                micBtn.classList.add('bg-red-500', 'border-red-200', 'pulse-red');
                micBtn.classList.remove('bg-sky-400', 'border-sky-100');
                btnLabel.innerText = "きいてるよ";
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                msg.innerText = "「" + transcript + "」を かんがえちゅう..."; // 何を認識したか表示
                
                try {
                    // GET方式に変更：URLの末尾にテキストをくっつける
                    const targetUrl = `${GAS_URL}?text=${encodeURIComponent(transcript)}`;
                    const res = await fetch(targetUrl);
                    const data = await res.json();
                    
                    if (data.words) {
                        renderWords(data.words);
                        sounds.success.play();
                        msg.innerText = ""; 
                    } else {
                        msg.innerText = "うまく よめなかったよ";
                    }
                } catch (e) {
                    console.error(e);
                    msg.innerText = "つうしん エラー";
                }
            };
        }

        function renderWords(words) {
            display.innerHTML = '';
            words.forEach((word, i) => {
                const card = document.createElement('div');
                card.className = 'word-card bg-white border-b-8 border-orange-100 rounded-3xl p-6 shadow-xl';
                card.innerHTML = `<span class="text-6xl font-black text-gray-700">${word}</span>`;
                card.style.animationDelay = `${i * 0.1}s`;
                display.appendChild(card);
            });
        }
    </script>
</body>
</html>
