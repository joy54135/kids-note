<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ふりかえり たからばこ v41</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sketchbook { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
        .suck-in { transition: all 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045); transform: scale(0) translate(200px, 400px) rotate(20deg) !important; opacity: 0; }
        .modal-bg { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .step-num { position: absolute; top: -10px; left: -10px; width: 24px; height: 24px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; border: 2px solid currentColor; }
    </style>
</head>
<body class="bg-amber-50 h-screen flex flex-col items-center p-4 overflow-hidden select-none">

    <div class="w-full max-w-3xl flex justify-between items-center mb-1">
        <button id="historyBtn" class="bg-white border-2 border-orange-200 rounded-full px-5 py-2 shadow-sm active:scale-90 transition-all">
            <span class="text-2xl">🎁</span> <span class="text-xs font-black text-orange-400 italic">きろく</span>
        </button>
        
        <h1 class="text-xl font-black text-orange-400 tracking-tighter text-center flex-1">ふりかえり たからばこ</h1>

        <div class="relative">
            <select id="gradeMode" class="bg-orange-400 text-white font-black text-xs px-3 py-2 rounded-full border-2 border-white shadow-sm outline-none appearance-none cursor-pointer">
                <option value="0">ひらがな</option>
                <option value="1" selected>1ねんせい</option>
                <option value="2">2ねんせい</option>
                <option value="3">3ねんせい</option>
                <option value="4">4ねんせい</option>
                <option value="5">5ねんせい</option>
                <option value="6">6ねんせい</option>
                <option value="99">ぜんぶ</option>
            </select>
        </div>
    </div>

    <div id="canvas" class="flex-1 w-full max-w-3xl bg-white rounded-3xl shadow-inner border-4 border-orange-100 p-6 mb-4 flex flex-col sketchbook relative transition-all duration-700">
        <div id="outputContainer" class="w-full h-[80%] overflow-y-auto flex flex-wrap content-start gap-y-2">
            <textarea id="hiddenInput" class="opacity-0 absolute -z-10"></textarea>
             <div id="richDisplay" class="text-5xl font-black text-gray-700 leading-tight w-full pointer-events-none"></div>
        </div>
        
        <div id="kanjiDisplay" class="w-full text-lg font-bold text-gray-300 border-t border-gray-100 pt-2 italic opacity-60"></div>
        <div id="preview" class="text-2xl font-bold text-sky-300 italic pointer-events-none mt-2"></div>
    </div>

    <div class="w-full max-w-4xl flex flex-col gap-3 mb-6">
        <div class="grid grid-cols-3 gap-4">
            <button id="micBtn" class="relative bg-sky-400 border-4 border-sky-100 rounded-2xl py-4 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <div class="step-num text-sky-400">1</div>
                <span id="btnLabel" class="text-2xl font-black italic text-center leading-none">おしてね</span>
                <span class="text-[9px] font-bold opacity-80">おはなしする</span>
            </button>
            <button id="listenBtn" class="relative bg-green-400 border-4 border-green-100 rounded-2xl py-4 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white leading-none">
                <div class="step-num text-green-400">2</div>
                <span class="text-3xl">📢</span>
                <span class="text-[10px] font-black italic">きいてみる</span>
            </button>
            <button id="saveBtn" class="relative bg-orange-400 border-4 border-orange-100 rounded-2xl py-4 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white leading-none">
                <div class="step-num text-orange-400">3</div>
                <span class="text-3xl">💰</span>
                <span class="text-[10px] font-black">ほぞんする</span>
            </button>
        </div>

        <div class="grid grid-cols-3 gap-4 px-10">
            <button id="clearBtn" class="bg-white border-2 border-gray-200 rounded-xl py-1 active:bg-gray-100 flex items-center justify-center gap-2">
                <span class="text-xl">🧹</span><span class="text-[10px] font-black text-gray-400">ぜんぶ消す</span>
            </button>
            <button id="backspaceBtn" class="bg-white border-2 border-orange-100 rounded-xl py-1 active:bg-orange-50 flex items-center justify-center gap-2">
                <span class="text-xl">⌫</span><span class="text-[10px] font-black text-orange-400 text-center leading-none">1字けす</span>
            </button>
            <button id="newLineBtn" class="bg-white border-2 border-gray-200 rounded-xl py-1 active:bg-gray-100 flex items-center justify-center gap-2">
                <span class="text-xl">⏎</span><span class="text-[10px] font-black text-gray-400 text-center leading-none">つぎの行</span>
            </button>
        </div>
    </div>

    <div id="subjectModal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">
            <h2 id="subjectModalTitle" class="text-2xl font-black text-orange-400 mb-6 text-center italic">どの きょうか？</h2>
            <div class="grid grid-cols-2 gap-4">
                <button class="subj-btn bg-pink-100 p-5 rounded-2xl font-black text-pink-600 text-xl" data-subj="こくご">こくご</button>
                <button class="subj-btn bg-blue-100 p-5 rounded-2xl font-black text-blue-600 text-xl" data-subj="さんすう">さんすう</button>
                <button class="subj-btn bg-green-100 p-5 rounded-2xl font-black text-green-600 text-xl" data-subj="せいかつ">せいかつ</button>
                <button class="subj-btn bg-yellow-100 p-5 rounded-2xl font-black text-yellow-600 text-xl" data-subj="おんがく">おんがく</button>
                <button class="subj-btn bg-purple-100 p-5 rounded-2xl font-black text-purple-600 text-xl" data-subj="ずこう">ずこう</button>
                <button class="subj-btn bg-red-100 p-5 rounded-2xl font-black text-red-600 text-xl" data-subj="たいいく">たいいく</button>
            </div>
            <button onclick="closeModal('subjectModal')" class="w-full mt-6 text-gray-400 font-bold">やめる</button>
        </div>
    </div>

    <div id="confirmModal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl text-center border-8 border-orange-200">
            <p id="confirmText" class="text-3xl font-black text-gray-700 mb-8 leading-relaxed italic"></p>
            <div class="flex gap-4">
                <button onclick="closeModal('confirmModal')" class="flex-1 bg-gray-100 py-4 rounded-2xl text-xl font-bold text-gray-400">いいえ</button>
                <button id="execSave" class="flex-1 bg-orange-500 py-4 rounded-2xl text-xl font-black text-white shadow-lg">はい！</button>
            </div>
        </div>
    </div>

    <div id="historyDetailModal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">
        <div class="bg-amber-50 rounded-3xl p-6 w-full max-w-2xl h-[85vh] shadow-2xl flex flex-col border-4 border-amber-200">
            <h2 id="historyDetailTitle" class="text-2xl font-black text-amber-600 mb-4 text-center italic"></h2>
            <div id="historyDetailList" class="flex-1 overflow-y-auto space-y-4 pr-1"></div>
            <button onclick="closeModal('historyDetailModal'); document.getElementById('subjectModal').classList.remove('hidden');" class="mt-4 bg-amber-400 text-white py-4 rounded-2xl font-black">もどる</button>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzhJTL1fmXZFnrSzcM-n_N-ahauuOTTurjJyh5vSP1wUZy_x__C6F-J_YrJQm_n4Y-i/exec';
        
        // 漢字リスト（学年別）
        const KANJI_LISTS = {
            1: "一右雨円王音下火花貝学気九休玉金空月犬見五口校左三山子四糸字耳七車手十出女小上森人水正生青夕石赤千川先早草足村大男竹中虫町天田土二日入年白八百文木本名目立力林六",
            2: "引羽雲園遠何科夏家歌画回会海絵外角楽活間丸岩顔汽記帰弓牛魚京強教近兄形計元言原戸古午後語工公広交光考行高黄合谷国黒今才細作算止市矢姉思紙寺自時室社弱首秋週春書少場色食心新親図数西声星晴切雪船線前組走多太体台地池知茶昼長鳥朝直通弟店点電刀冬当東答頭同道読内南肉馬売買麦半番父風分聞米歩母方北毎妹万明鳴毛門夜野友用曜来里理話",
            3: "悪安暗医委意育員院飲運泳駅央横屋温化荷界開階寒感漢館岸起期客究急級宮球去橋業曲局銀区苦具君係軽血決研県庫湖向幸港号根祭皿仕死使始指歯詩次事持式実写者主守取酒受州拾終習集住重宿所暑助昭消商章勝乗植申身神真深進世整昔全相送想息速族他打対待代第題炭短談着注柱丁帳調追定庭笛鉄転都度投豆島湯登等動童農波配倍箱畑発反坂板皮悲美鼻筆氷表秒病品負部服福物平返勉放味命面問役薬由油有遊予羊洋葉陽様落流旅両緑礼列練路和",
            4: "愛案以衣位茨印英栄媛塩岡億加果貨課芽賀改械害街各覚潟完官管関観願岐希旗器機議求泣給挙漁共協鏡競極熊訓軍郡群径景芸欠 結建健験固功好香候康佐差菜最埼材崎昨札刷察参産散残氏司試児治滋辞鹿失借種周祝順初松笑唱焼照城縄臣信井成省清静席積折節説浅戦選然争倉巣束側続卒孫帯隊達単置仲沖兆低底的な典伝徒努灯働特徳栃木奈梨熱念敗梅博阪飯飛必票標不夫付府阜富副兵別辺変便包法望牧末満未民無約勇要養浴利陸良料量輪類令冷例連老労録",
            5: "圧囲移因永営衛易益液演応往桜可仮価河過快解格確額刊幹慣眼紀基寄規喜技義逆久旧救居許境均禁句型経潔件険検限現減故個護効厚耕航鉱構興講告混査再災妻採際在財罪殺雑酸賛士支史志枝師資飼示似識質舎謝授修述術準序招証象賞条状常表情織職制性政勢精製税責績接設絶祖素総造像増則測属率損貸態団断築貯張停提程適統堂銅導得毒独任燃能破犯判版比肥非費備評貧布婦武復複仏粉編弁保墓報豊防貿暴脈務夢迷綿輸余容略留領歴",
            6: "胃異遺域宇映延沿恩我灰拡革閣割株干巻看簡危机揮貴疑吸供胸郷勤筋系敬警劇激穴券絹権憲源厳己呼誤后孝皇紅降鋼刻穀骨困砂座済裁策冊蚕至私姿視詞誌磁射捨尺若樹収宗就衆従縦縮熟純処署諸除承将傷障蒸針仁垂推寸盛聖誠舌宣専泉洗染銭善奏窓創装層操蔵臓存尊退宅担探誕段暖値宙忠著庁頂腸潮賃痛敵展討党糖届難乳認納脳派拝背肺俳班晩否批秘俵腹奮並陛閉片補暮宝訪亡忘棒枚幕密盟模訳郵優預幼欲翌乱卵覧裏律臨朗論"
        };

        const ricDisplay = document.getElementById('richDisplay');
        const kanjiDisplay = document.getElementById('kanjiDisplay');
        const preview = document.getElementById('preview');
        const canvas = document.getElementById('canvas');
        const gradeMode = document.getElementById('gradeMode');
        
        let fullConversation = []; // {surface, furigana}の配列
        let currentKanjiText = ""; // 読み上げ用のフル漢字文

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // --- フィルタリングロジック ---
        function getGradeLevel() { return parseInt(gradeMode.value); }

        function renderDisplay() {
            const level = getGradeLevel();
            let html = "";
            let hiraganaOnly = "";

            fullConversation.forEach(word => {
                if (word.surface === "\n") {
                    html += "<br>";
                    hiraganaOnly += "\n";
                    return;
                }
                
                const furigana = word.furigana || word.surface;
                hiraganaOnly += furigana;

                if (level === 0) {
                    html += furigana;
                } else if (level === 99) {
                    html += word.surface;
                } else {
                    // 指定学年までの漢字が含まれているか判定
                    let canShowKanji = true;
                    const allowedKanji = getAllowedKanji(level);
                    
                    for (let char of word.surface) {
                        // 漢字かつ許可リストにない場合
                        if (isKanji(char) && !allowedKanji.includes(char)) {
                            canShowKanji = false;
                            break;
                        }
                    }
                    html += canShowKanji ? word.surface : furigana;
                }
            });

            ricDisplay.innerHTML = html;
            kanjiDisplay.innerText = currentKanjiText;
            return hiraganaOnly;
        }

        function getAllowedKanji(level) {
            let list = "";
            for (let i = 1; i <= level; i++) {
                list += KANJI_LISTS[i] || "";
            }
            return list;
        }

        function isKanji(ch) {
            return (ch >= '\u4e00' && ch <= '\u9faf');
        }

        gradeMode.onchange = renderDisplay;

        // --- ほぞんロジック ---
        document.getElementById('saveBtn').onclick = () => {
            if(!fullConversation.length) return;
            document.getElementById('subjectModalTitle').innerText = "なんの おべんきょう？";
            document.getElementById('subjectModal').classList.remove('hidden');
        };

        document.querySelectorAll('.subj-btn').forEach(btn => {
            btn.onclick = () => {
                const subj = btn.dataset.subj;
                const isHistory = document.getElementById('subjectModalTitle').innerText.includes("みたい");
                if (isHistory) {
                    showHistory(subj);
                } else {
                    const confirmTxt = `${subj}に\nほぞん する？`;
                    document.getElementById('confirmText').innerText = confirmTxt;
                    document.getElementById('subjectModal').classList.add('hidden');
                    document.getElementById('confirmModal').classList.remove('hidden');
                    window.selectedSubj = subj;
                }
            };
        });

        document.getElementById('execSave').onclick = () => {
            closeModal('confirmModal');
            canvas.classList.add('suck-in');
            setTimeout(() => {
                const history = JSON.parse(localStorage.getItem('furiHistory') || '[]');
                // 保存は常に「ひらがなのみ」
                const hira = renderDisplay(); 
                history.unshift({ date: new Date().toLocaleString('ja-JP'), subject: window.selectedSubj, text: hira });
                localStorage.setItem('furiHistory', JSON.stringify(history));
                
                // リセット
                fullConversation = [];
                currentKanjiText = "";
                renderDisplay();
                canvas.classList.remove('suck-in');
                alert(`${window.selectedSubj}に ほぞんしました！`);
            }, 850);
        };

        document.getElementById('historyBtn').onclick = () => {
            document.getElementById('subjectModalTitle').innerText = "どれを みたい？";
            document.getElementById('subjectModal').classList.remove('hidden');
        };

        function showHistory(subject) {
            document.getElementById('subjectModal').classList.add('hidden');
            const list = document.getElementById('historyDetailList');
            const data = JSON.parse(localStorage.getItem('furiHistory') || '[]');
            const filtered = data.filter(item => item.subject === subject);
            document.getElementById('historyDetailTitle').innerText = `🎁 ${subject}の きろく`;
            list.innerHTML = filtered.length ? "" : "<p class='text-center mt-20 text-gray-400 font-bold'>きろくが ありません</p>";
            filtered.forEach(item => {
                const d = document.createElement('div');
                d.className = "bg-white p-4 rounded-2xl shadow-sm border-l-8 border-orange-300 mb-4";
                d.innerHTML = `<div class='text-[9px] text-gray-300'>${item.date}</div><p class='text-xl font-black text-gray-600'>${item.text.replace(/\n/g, '<br>')}</p>`;
                list.appendChild(d);
            });
            document.getElementById('historyDetailModal').classList.remove('hidden');
        }

        // --- 音声・通信 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let isRunning = false;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP'; recognition.interimResults = true;
            
            document.getElementById('micBtn').onclick = () => { if (!isRunning) recognition.start(); else recognition.stop(); };
            document.getElementById('listenBtn').onclick = () => {
                window.speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(currentKanjiText || "なにか かいてね");
                uttr.lang = 'ja-JP'; uttr.rate = 0.95; window.speechSynthesis.speak(uttr);
            };

            document.getElementById('clearBtn').onclick = () => { if(confirm("ぜんぶ けす？")) { fullConversation = []; currentKanjiText = ""; renderDisplay(); } };
            document.getElementById('backspaceBtn').onclick = () => {
                fullConversation.pop();
                // 漢字テキストも簡易的に最後の1文字（または単語）を消去
                currentKanjiText = currentKanjiText.slice(0, -1);
                renderDisplay();
            };
            document.getElementById('newLineBtn').onclick = () => {
                fullConversation.push({surface: "\n", furigana: ""});
                currentKanjiText += "\n";
                renderDisplay();
            };

            recognition.onstart = () => { isRunning = true; document.getElementById('micBtn').classList.add('bg-red-500', 'pulse-red'); document.getElementById('btnLabel').innerText = "おわる"; };
            recognition.onresult = (event) => {
                let interim = ''; let final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript; else interim += event.results[i][0].transcript;
                }
                if (interim) preview.innerText = interim;
                if (final) { 
                    preview.innerText = "へんかん中..."; 
                    currentKanjiText += final;
                    sendToGas(final); 
                }
            };
            recognition.onend = () => { isRunning = false; document.getElementById('micBtn').classList.remove('bg-red-500', 'pulse-red'); document.getElementById('btnLabel').innerText = "おしてね"; preview.innerText = ""; };
        }

        async function sendToGas(text) {
            try {
                const res = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}`);
                const data = await res.json();
                if (data.words_all) {
                    // APIから返ってきた全単語オブジェクトを保持
                    fullConversation = [...fullConversation, ...data.words_all];
                    renderDisplay();
                }
            } catch (e) {}
        }
    </script>
</body>
</html>
