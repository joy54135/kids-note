<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひらがな めがね Ver.12.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pop { 0% { transform: scale(0.5) opacity: 0; } 100% { transform: scale(1) opacity: 1; } }
        .word-card { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-amber-50 h-screen flex flex-col items-center justify-between p-6 overflow-hidden select-none">

    <h1 class="text-3xl font-black text-orange-400 mt-4 tracking-tighter text-center">ひらがな めがね</h1>

    <div id="display-container" class="flex-1 w-full flex flex-col items-center justify-center relative">
        <div id="display" class="flex flex-wrap justify-center gap-4 w-full content-center text-center">
            <p id="msg" class="text-2xl text-orange-300 font-bold px-4">ボタンを おしてね</p>
        </div>
        <div id="big-error" class="absolute inset-0 flex flex-col items-center justify-center bg-amber-50/90 hidden z-50 p-4 text-center">
            <p class="text-red-500 font-bold text-xl mb-4">エラーがおきたよ</p>
            <p id="error-detail" class="text-red-400 text-sm font-mono break-all max-w-xs"></p>
            <button onclick="location.reload()" class="mt-8 bg-orange-400 text-white px-6 py-2 rounded-full font-bold">もういちど</button>
        </div>
    </div>

    <div class="mb-12 relative flex flex-col items-center">
        <button id="micBtn" class="w-44 h-44 bg-sky-400 border-[12px] border-sky-100 rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-all outline-none">
            <span id="btnLabel" class="text-white text-3xl font-black italic">おしてね</span>
        </button>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzj8UM_pMVEnL_cM3XAl3twX4ocBdHrklPfjmMUCCm-Po_D6ACv4j_ZFTXuAtmy1I9v/exec'; 
        
        const sounds = {
            start: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            stop: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            success: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3')
        };

        const micBtn = document.getElementById('micBtn');
        const btnLabel = document.getElementById('btnLabel');
        const msg = document.getElementById('msg');
        const bigError = document.getElementById('big-error');
        const errorDetail = document.getElementById('error-detail');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let isRunning = false;

        if (!SpeechRecognition) {
            msg.innerText = "Safariで ひらいてね";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;

            micBtn.onclick = () => {
                if (!isRunning) {
                    bigError.classList.add('hidden');
                    sounds.start.play().catch(() => {});
                    try { recognition.start(); } catch(e) {}
                } else {
                    sounds.stop.play().catch(() => {});
                    recognition.stop();
                }
            };

            recognition.onstart = () => {
                isRunning = true;
                micBtn.classList.add('bg-red-500', 'border-red-200', 'pulse-red');
                btnLabel.innerText = "おわる";
                msg.innerText = "はなしてみてね！";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                msg.innerText = "「" + transcript + "」";
                if (event.results[0].isFinal) {
                    msg.innerText = "へんかん中...";
                    sendToGas(transcript);
                }
            };

            recognition.onend = () => {
                isRunning = false;
                micBtn.classList.remove('bg-red-500', 'border-red-200', 'pulse-red');
                btnLabel.innerText = "おしてね";
            };
        }

        async function sendToGas(text) {
            try {
                const res = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}`);
                const data = await res.json();
                if (data.words) {
                    renderWords(data.words);
                    sounds.success.play().catch(() => {});
                    msg.innerText = "";
                } else {
                    showError(data.error, data.debug);
                }
            } catch (e) {
                showError("通信エラー", e.message);
            }
        }

        function showError(title, detail) {
            bigError.classList.remove('hidden');
            errorDetail.innerText = `${title}\n${detail}`;
        }

        function renderWords(words) {
            const display = document.getElementById('display');
            display.innerHTML = '';
            words.forEach((word, i) => {
                const card = document.createElement('div');
                card.className = 'word-card bg-white border-b-8 border-orange-100 rounded-3xl p-6 shadow-xl m-2';
                card.innerHTML = `<span class="text-6xl font-black text-gray-700 leading-none">${word}</span>`;
                card.style.animationDelay = `${i * 0.1}s`;
                display.appendChild(card);
            });
        }
    </script>
</body>
</html>
