<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひらがな スケッチブック Pro v27</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sketchbook { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
        #preview { min-height: 1.5em; }
    </style>
</head>
<body class="bg-amber-50 h-screen flex flex-col items-center p-4 overflow-hidden">

    <h1 class="text-2xl font-black text-orange-400 my-1 tracking-tighter">ひらがな スケッチブック</h1>

    <div class="flex-1 w-full max-w-3xl bg-white rounded-3xl shadow-inner border-4 border-orange-100 p-6 mb-2 flex flex-col sketchbook relative">
        <textarea id="output" 
            class="w-full h-full bg-transparent text-6xl font-black text-gray-700 leading-tight resize-none focus:outline-none"
            placeholder="おしてね を おして はなしてね"
            spellcheck="false"></textarea>
        <div id="preview" class="text-2xl font-bold text-sky-300 italic pointer-events-none mt-2"></div>
    </div>

    <div class="w-full max-w-4xl grid grid-cols-5 gap-2 mb-6">
        <button id="clearBtn" class="bg-white border-2 border-gray-200 rounded-2xl flex flex-col items-center justify-center py-2 active:bg-gray-100 transition-all">
            <span class="text-3xl">🧹</span>
            <span class="text-[10px] font-bold text-gray-400">ぜんぶ消す</span>
        </button>
        <button id="backspaceBtn" class="bg-white border-2 border-orange-200 rounded-2xl flex flex-col items-center justify-center py-2 active:bg-orange-50 transition-all">
            <span class="text-3xl">⌫</span>
            <span class="text-[10px] font-bold text-orange-400 font-black">1字けす</span>
        </button>
        <button id="newLineBtn" class="bg-white border-2 border-gray-200 rounded-2xl flex flex-col items-center justify-center py-2 active:bg-gray-100 transition-all">
            <span class="text-3xl">⏎</span>
            <span class="text-[10px] font-bold text-gray-400 font-black">つぎの行</span>
        </button>
        <button id="listenBtn" class="bg-green-400 border-4 border-green-100 rounded-2xl flex flex-col items-center justify-center py-2 shadow-lg active:scale-95 transition-all">
            <span class="text-3xl">📢</span>
            <span class="text-white text-[10px] font-black italic">きいてみる</span>
        </button>
        <button id="micBtn" class="bg-sky-400 border-4 border-sky-100 rounded-2xl flex flex-col items-center justify-center py-2 shadow-lg active:scale-95 transition-all outline-none">
            <span id="btnLabel" class="text-white text-xl font-black italic">おしてね</span>
        </button>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/library/d/1fYrzmyiRy9wnty4xWPP_TrKD2BmRzC6IHEFSdKHzRHj_gbZ1ETdV9fGF/16'; 

        const micBtn = document.getElementById('micBtn');
        const clearBtn = document.getElementById('clearBtn');
        const backspaceBtn = document.getElementById('backspaceBtn');
        const newLineBtn = document.getElementById('newLineBtn');
        const listenBtn = document.getElementById('listenBtn');
        const btnLabel = document.getElementById('btnLabel');
        const output = document.getElementById('output');
        const preview = document.getElementById('preview');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let isRunning = false;

        // --- 自然な読み上げのためのボイス設定 ---
        let voices = [];
        function setVoiceList() {
            voices = window.speechSynthesis.getVoices();
        }
        setVoiceList();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = setVoiceList;
        }

        // 高品質な日本語ボイスを探す関数
        function getBestJapaneseVoice() {
            const jpVoices = voices.filter(v => v.lang === 'ja-JP');
            // 1. Siriボイス、2. Enhanced（拡張）ボイス、3. Google、4. その他 の順で探す
            return jpVoices.find(v => v.name.includes('Siri')) || 
                   jpVoices.find(v => v.name.includes('Enhanced')) ||
                   jpVoices.find(v => v.name.includes('Google')) ||
                   jpVoices[0];
        }

        if (!SpeechRecognition) {
            output.value = "Safariで ひらいてね";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;

            micBtn.onclick = () => {
                if (!isRunning) { try { recognition.start(); } catch(e) {} } 
                else { recognition.stop(); btnLabel.innerText = "WAIT"; }
            };

            // 自然な読み上げの実行
            listenBtn.onclick = () => {
                window.speechSynthesis.cancel(); // 前の音声を止める
                const uttr = new SpeechSynthesisUtterance(output.value);
                
                const bestVoice = getBestJapaneseVoice();
                if (bestVoice) uttr.voice = bestVoice;

                uttr.lang = 'ja-JP';
                uttr.rate = 0.9;  // 少しゆっくり（0.1〜10）
                uttr.pitch = 1.1; // 少し高めの可愛い声（0〜2）
                
                window.speechSynthesis.speak(uttr);
            };

            clearBtn.onclick = () => { if(output.value && confirm("ぜんぶ けして いい？")) output.value = ""; };

            backspaceBtn.onclick = () => {
                const start = output.selectionStart;
                const end = output.selectionEnd;
                const val = output.value;
                if (start === end) {
                    if (start > 0) {
                        output.value = val.substring(0, start - 1) + val.substring(end);
                        output.selectionStart = output.selectionEnd = start - 1;
                    }
                } else {
                    output.value = val.substring(0, start) + val.substring(end);
                    output.selectionStart = output.selectionEnd = start;
                }
                output.focus();
            };

            newLineBtn.onclick = () => {
                const start = output.selectionStart;
                const val = output.value;
                output.value = val.substring(0, start) + "\n" + val.substring(start);
                output.selectionStart = output.selectionEnd = start + 1;
                output.focus();
            };

            recognition.onstart = () => {
                isRunning = true;
                micBtn.classList.add('bg-red-500', 'pulse-red');
                btnLabel.innerText = "おわる";
                preview.innerText = "きいてるよ...";
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) finalTranscript += transcript;
                    else interimTranscript += transcript;
                }
                if (interimTranscript) preview.innerText = interimTranscript;
                if (finalTranscript) {
                    preview.innerText = "へんかん中...";
                    sendToGas(finalTranscript);
                }
            };

            recognition.onend = () => {
                isRunning = false;
                micBtn.classList.remove('bg-red-500', 'pulse-red');
                btnLabel.innerText = "おしてね";
                preview.innerText = "";
            };
        }

        async function sendToGas(text) {
    try {
        const res = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}`);
        const data = await res.json();
        if (data.words) {
            const newText = data.words.join('');
            const start = output.selectionStart;
            output.value = output.value.substring(0, start) + newText + output.value.substring(start);
            output.selectionStart = output.selectionEnd = start + newText.length;
            output.focus();
            preview.innerText = "";
        }
    } catch (e) {
        // ★ ここを書き換え！
        showError("エラー詳細", e.message + " (URLが正しいか確認してね)");
    }
}
    </script>
</body>
</html>
