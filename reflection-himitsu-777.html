<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kosugi Maru', sans-serif; background: #FFF9E6; text-align: center; padding: 10px; }
    .card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
    textarea { width: 90%; height: 80px; font-size: 1.2rem; border: 3px solid #FFD700; border-radius: 15px; padding: 10px; }
    .mode-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 15px 0; }
    .mode-btn { padding: 10px 2px; font-size: 0.9rem; border-radius: 10px; border: 1px solid #ccc; background: white; }
    .mode-btn.active { background: #FFD700; border-color: #FF8C00; font-weight: bold; }
    #voice-btn { background: #FF6347; color: white; border: none; padding: 15px; border-radius: 50%; font-size: 2rem; width: 80px; height: 80px; margin-bottom: 10px; cursor: pointer; }
    #voice-btn.recording { background: #666; animation: blink 1s infinite; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    #result-box { background: white; border: 6px solid #FF8C00; border-radius: 20px; min-height: 80px; padding: 15px; font-size: 1.8rem; margin-top: 15px; text-align: left; }
    #submit-btn { background: #32CD32; color: white; border: none; padding: 15px 30px; border-radius: 40px; font-size: 1.2rem; font-weight: bold; width: 100%; margin-top: 10px; }
    #preview { max-width: 100%; border-radius: 10px; display: none; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <button id="voice-btn" onclick="toggleVoice()">🎤</button>
    <div id="status">マイクをおして おはなししてね</div>
    <textarea id="input-text" placeholder="ここに おはなしが 出るよ"></textarea>
    
    <div class="mode-container">
      <button class="mode-btn active" onclick="setMode(1, this)">①かな</button>
      <button class="mode-btn" onclick="setMode(2, this)">②カナ</button>
      <button class="mode-btn" onclick="setMode(3, this)">③1年</button>
      <button class="mode-btn" onclick="setMode(4, this)">④2年</button>
    </div>

    <input type="file" id="photo-input" accept="image/*" onchange="previewImage()" style="margin: 10px 0;">
    <img id="preview">
    <button id="submit-btn" onclick="sendData()">せんせいに おくる！</button>
  </div>
  <div id="result-box">ここに へんかんした もじが 出るよ</div>

  <script>
    // 【最重要】あなたのウェブアプリURLをここに貼り付けてください
    const GAS_URL = "あなたのウェブアプリURL";

    let mode = 1;
    let base64 = null;
    let recognition = null;

    // 音声認識のセットアップ
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.continuous = false;
      recognition.onstart = () => { 
        document.getElementById('voice-btn').classList.add('recording');
        document.getElementById('status').innerText = "きいています..."; 
      };
      recognition.onend = () => { 
        document.getElementById('voice-btn').classList.remove('recording');
        document.getElementById('status').innerText = "マイクをおして おはなししてね"; 
      };
      recognition.onerror = (e) => { alert("マイクエラー: " + e.error); };
      recognition.onresult = (e) => {
        document.getElementById('input-text').value = e.results[0][0].transcript;
      };
    }

    function toggleVoice() {
      if (!recognition) return alert("このブラウザはマイクに対応していません。");
      recognition.start();
    }

    function setMode(m, btn) {
      mode = m;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function previewImage() {
      const file = document.getElementById('photo-input').files[0];
      const reader = new FileReader();
      reader.onloadend = () => {
        base64 = reader.result;
        const img = document.getElementById('preview');
        img.src = base64; img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    async function sendData() {
      const text = document.getElementById('input-text').value;
      if(!text) return alert("なにか おはなししてね！");
      const btn = document.getElementById('submit-btn');
      btn.innerText = "おくり中...";
      
      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ text, mode, imageBase64: base64, fileName: "image.jpg" })
        });
        const res = await response.json();
        document.getElementById('result-box').innerText = res.studentText;
        btn.innerText = "おわったよ！";
      } catch (err) {
        alert("エラー: " + err);
        btn.innerText = "もういちど おくる";
      }
    }
  </script>
</body>
</html><!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>せんせいと ふりかえり</title>
  <style>
    /* （昨日のCSSをそのまま貼り付けてください。長いので省略します） */
    body { font-family: sans-serif; background: #FFF9E6; text-align: center; }
    .card { background: white; border-radius: 20px; padding: 15px; max-width: 600px; margin: 10px auto; }
    textarea { width: 90%; height: 70px; border: 3px solid #FFD700; border-radius: 10px; }
    #result-box { border: 4px solid #FF8C00; border-radius: 15px; padding: 15px; font-size: 1.5rem; margin-top: 10px; }
    #voice-btn { font-size: 2rem; padding: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2>きょうの ふりかえり</h2>
    <button id="voice-btn" onclick="toggleVoice()">🎤</button>
    <p>マイクをおして おはなししてね</p>
    <textarea id="input-text"></textarea>
    <button id="submit-btn" onclick="sendData()">せんせいに おくる！</button>
  </div>
  <div id="result-box">ここに もじが 出るよ</div>

  <script>
    // 【重要】ここにあなたのGASのURLを貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbykQlJkKByIrDJc0A0CjXIgo2jA9j5cytG2y4Tec7pT09BMDXEIenGBZmso1h_zWldCkA/exec";

    let mode = 1;
    let recognition;
    
    // 音声認識の設定（iframeの外なので、これで動くようになります）
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.onresult = (event) => {
        const speechText = event.results[0][0].transcript;
        document.getElementById('input-text').value = speechText;
        // （ここに自動変換の処理を入れることも可能です）
      };
    }

    function toggleVoice() {
      recognition.start();
    }

    function sendData() {
      const text = document.getElementById('input-text').value;
      const btn = document.getElementById('submit-btn');
      btn.innerText = "おくり中...";

      // google.script.run の代わりの「fetch」
      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          text: text,
          mode: mode,
          imageBase64: null, // 画像を送る場合はここにbase64を入れる
          fileName: "image.jpg"
        })
      })
      .then(res => res.json())
      .then(res => {
        document.getElementById('result-box').innerText = res.studentText;
        btn.innerText = "おわったよ！";
      })
      .catch(err => alert("エラー: " + err));
    }
  </script>
</body>
</html>
