<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>学びの足跡 v4.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // --- 1. データと状態 (iPad対策で最上部に配置) ---
        var GAS_URL = 'https://script.google.com/macros/s/AKfycbxxE14tNshFIqZHwzhyGQtRDeSazD9aPex9Tm0gIGJjmUvd8jAiFN-bkQyNIt_D9cV_/exec';
        var appData = { t1: [], t2: [], t3: [], t4: [], photos: [] };
        var activeId = "";
        var isRec = false;

        // --- 2. 画面を切り替える命令 (壁を消す処理を追加) ---
        function openEditor(id) {
            activeId = id;
            var overlay = document.getElementById('editorOverlay');
            overlay.style.display = 'flex';
            overlay.style.pointerEvents = 'auto'; // 触れるようにする
            
            document.getElementById('editorTitle').innerText = {t1:'めあて', t2:'できたこと', t3:'むずかしかった', t4:'つぎのこと'}[id];
            renderEditor();
        }

        function closeEditor(save) {
            var overlay = document.getElementById('editorOverlay');
            overlay.style.display = 'none';
            overlay.style.pointerEvents = 'none'; // 触れないようにする（壁を撤去）
            
            if(save) refreshTiles();
        }

        // --- 3. 音声認識 (エラーで止まらないよう保護) ---
        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        var rec = SpeechRecognition ? new SpeechRecognition() : null;
        if(rec) {
            rec.lang = 'ja-JP'; rec.interimResults = true;
            rec.onstart = function() { isRec = true; document.getElementById('micBtn').style.background = "#ef4444"; document.getElementById('micLabel').innerText = "きいてるよ"; };
            rec.onend = function() { isRec = false; document.getElementById('micBtn').style.background = "#38bdf8"; document.getElementById('micLabel').innerText = "おしてね"; };
            rec.onresult = function(e) { if(e.results[e.resultIndex].isFinal) sendToGas(e.results[e.resultIndex][0].transcript); };
        }

        function toggleMic() { if(!rec) return; isRec ? rec.stop() : rec.start(); }

        async function sendToGas(text) {
            try {
                var res = await fetch(GAS_URL + '?text=' + encodeURIComponent(text));
                var d = await res.json();
                if(d.words_all) {
                    appData[activeId] = appData[activeId].concat(d.words_all);
                    renderEditor();
                }
            } catch(e) {}
        }

        // --- 4. 写真 (4枚まで) ---
        function handlePhotos(input) {
            var files = Array.from(input.files);
            files.forEach(function(file) {
                if(appData.photos.length >= 4) return;
                var reader = new FileReader();
                reader.onload = function(e) {
                    var img = new Image();
                    img.onload = function() {
                        var canvas = document.createElement('canvas');
                        var max = 400; var w = img.width, h = img.height;
                        if(w > h) { if(w > max){ h *= max/w; w = max; } } else { if(h > max){ w *= max/h; h = max; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        appData.photos.push(canvas.toDataURL('image/jpeg', 0.5));
                        refreshTiles();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // --- 5. 画面の見た目を更新 ---
        function renderEditor() {
            var html = ""; var kanji = "";
            appData[activeId].forEach(function(w) {
                html += w.furigana || w.surface;
                kanji += w.surface;
            });
            document.getElementById('richDisplay').innerHTML = html;
            document.getElementById('kanjiDisplay').innerText = kanji;
        }

        function refreshTiles() {
            ['t1','t2','t3','t4'].forEach(function(id) {
                var txt = "";
                appData[id].forEach(function(w) { txt += w.surface; });
                document.getElementById('p-' + id).innerText = txt || "タップして かく";
            });
            var photoHtml = "";
            appData.photos.forEach(function(src) { photoHtml += '<img src="' + src + '" class="photo-item">'; });
            document.getElementById('photoGrid').innerHTML = photoHtml;
        }
    </script>

    <style>
        body { height: 100dvh; background-color: #fffbeb; margin: 0; overflow: hidden; }
        .tile-btn { 
            background: white; border: 4px solid #ffedd5; border-radius: 1.5rem; padding: 1rem;
            display: flex; flex-direction: column; width: 100%; height: 130px; text-align: left;
            position: relative; z-index: 10;
        }
        .tile-btn:active { background: #fff7ed; transform: scale(0.98); }
        .tile-label { color: #fb923c; font-weight: 900; font-size: 0.8rem; margin-bottom: 0.3rem; pointer-events: none; }
        .tile-preview { flex: 1; color: #4b5563; font-weight: bold; overflow: hidden; font-size: 1rem; line-height: 1.2; pointer-events: none; }
        
        /* 透明な壁にならないように設定 */
        #editorOverlay { 
            position: fixed; inset: 0; background: #fffbeb; z-index: 9999; 
            display: none; flex-direction: column; padding: 1rem;
            pointer-events: none; 
        }
        #richDisplay { flex: 1; background: white; border: 4px solid #ffedd5; border-radius: 2rem; padding: 1.5rem; font-size: 2rem; font-weight: 900; outline: none; overflow-y: auto; }
        
        .photo-grid-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; width: 100%; height: 100%; pointer-events: none; }
        .photo-item { width: 100%; height: 100%; object-fit: cover; border-radius: 0.5rem; background: #eee; }
    </style>
</head>
<body class="p-3 select-none">

    <div id="mainView" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black text-orange-400">学びの足跡 v4.8</h1>
            <button onclick="location.reload()" class="bg-white border-2 border-gray-200 rounded-full px-3 py-1 text-xs text-gray-400">やりなおす</button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button class="tile-btn" onclick="openEditor('t1')"><div class="tile-label">めあて</div><div id="p-t1" class="tile-preview">タップして かく</div></button>
            <button class="tile-btn" onclick="openEditor('t2')"><div class="tile-label">できたこと</div><div id="p-t2" class="tile-preview">タップして かく</div></button>
            <button class="tile-btn" onclick="openEditor('t3')"><div class="tile-label">むずかしかった</div><div id="p-t3" class="tile-preview">タップして かく</div></button>
            <button class="tile-btn" onclick="openEditor('t4')"><div class="tile-label">つぎのこと</div><div id="p-t4" class="tile-preview">タップして かく</div></button>
            
            <button class="tile-btn col-span-2" style="height: 110px;" onclick="document.getElementById('fileInput').click()">
                <div class="tile-label">しゃしん (4まいまで)</div>
                <div id="photoGrid" class="photo-grid-mini"></div>
                <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" onchange="handlePhotos(this)">
            </button>
        </div>
        
        <button onclick="alert('ほぞんしました！'); location.reload();" class="w-full bg-orange-400 text-white rounded-2xl py-4 font-black text-xl mt-4 shadow-lg">ぜんぶ ほぞんする 💰</button>
    </div>

    <div id="editorOverlay">
        <div class="flex justify-between items-center mb-3">
            <button onclick="closeEditor(false)" class="text-gray-400 font-bold p-2">やめる</button>
            <div id="editorTitle" class="text-orange-400 font-black text-xl">編集</div>
            <button onclick="closeEditor(true)" class="bg-orange-400 text-white px-6 py-2 rounded-full font-black">決定 ✅</button>
        </div>
        
        <div id="richDisplay" contenteditable="true"></div>
        <div id="kanjiDisplay" class="text-xs text-gray-300 italic opacity-60 mt-1"></div>

        <div class="grid grid-cols-2 gap-4 mt-4">
            <button id="micBtn" onclick="toggleMic()" class="bg-sky-400 rounded-2xl py-6 text-white font-black text-2xl shadow-lg"><span id="micLabel">おしてね</span></button>
            <button onclick="appData[activeId].pop(); renderEditor();" class="bg-white border-4 border-orange-100 rounded-2xl py-6 text-orange-400 font-black text-2xl shadow-lg">1字けす</button>
        </div>
    </div>

</body>
</html>
