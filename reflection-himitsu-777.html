<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学びの足跡 v4.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // 【重要】iPad対策：最初に関数をすべて用意しておく
        var appData = { t1: "", t2: "", t3: "", t4: "" };
        var activeId = "";

        function openEditor(id) {
            // タップが届いているか確認するためのテスト
            console.log("Tile clicked:", id);
            activeId = id;
            
            // 画面の切り替え
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('editorOverlay').style.display = 'flex';
            
            // タイトルの書き換え
            var titleText = {t1:'めあて', t2:'できたこと', t3:'むずかしかったこと', t4:'つぎのこと'}[id];
            document.getElementById('editorTitle').innerText = titleText;
            
            // 入力エリアの中身をセット
            document.getElementById('richDisplay').innerText = appData[id];
        }

        function closeEditor(shouldSave) {
            if (shouldSave) {
                appData[activeId] = document.getElementById('richDisplay').innerText;
                document.getElementById('p-' + activeId).innerText = appData[activeId];
            }
            document.getElementById('editorOverlay').style.display = 'none';
            document.getElementById('mainView').style.display = 'block';
        }

        function triggerPhoto() {
            document.getElementById('fileInput').click();
        }
    </script>

    <style>
        body { height: 100dvh; background-color: #fffbeb; margin: 0; font-family: sans-serif; }
        .tile-btn { 
            background: white; border: 4px solid #ffedd5; border-radius: 1.5rem; padding: 1rem;
            display: flex; flex-direction: column; width: 100%; height: 140px; text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .tile-label { color: #fb923c; font-weight: 900; font-size: 0.8rem; margin-bottom: 0.5rem; }
        .tile-preview { flex: 1; color: #4b5563; font-weight: bold; overflow: hidden; font-size: 1rem; }
        
        #editorOverlay { 
            position: fixed; inset: 0; background: #fffbeb; z-index: 9999; 
            display: none; flex-direction: column; padding: 1rem;
        }
        #richDisplay { 
            flex: 1; background: white; border: 4px solid #ffedd5; border-radius: 2rem;
            padding: 1.5rem; font-size: 2rem; font-weight: 900; outline: none;
        }
    </style>
</head>
<body>

    <div id="mainView" style="padding: 1rem;">
        <div style="display: flex; justify-content: center; margin-bottom: 1rem;">
            <h1 style="color: #fb923c; font-size: 1.2rem; font-weight: 900;">学びの足跡 v4.6</h1>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <button class="tile-btn" onclick="openEditor('t1')">
                <div class="tile-label">めあて</div>
                <div id="p-t1" class="tile-preview">タップして かく</div>
            </button>
            <button class="tile-btn" onclick="openEditor('t2')">
                <div class="tile-label">できたこと</div>
                <div id="p-t2" class="tile-preview">タップして かく</div>
            </button>
            <button class="tile-btn" onclick="openEditor('t3')">
                <div class="tile-label">むずかしかった</div>
                <div id="p-t3" class="tile-preview">タップして かく</div>
            </button>
            <button class="tile-btn" onclick="openEditor('t4')">
                <div class="tile-label">つぎのこと</div>
                <div id="p-t4" class="tile-preview">タップして かく</div>
            </button>
            <button class="tile-btn" style="grid-column: span 2; height: 100px;" onclick="triggerPhoto()">
                <div class="tile-label">しゃしん</div>
                <div id="photoStatus" class="tile-preview">しゃしんを えらぶ</div>
                <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
            </button>
        </div>
        
        <button onclick="alert('ほぞんしました！')" style="width: 100%; background: #fb923c; color: white; border: none; border-radius: 1rem; padding: 1.5rem; margin-top: 1rem; font-weight: 900; font-size: 1.2rem;">
            ぜんぶ ほぞんする 💰
        </button>
    </div>

    <div id="editorOverlay">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <button onclick="closeEditor(false)" style="color: #999; font-weight: bold; border: none; background: none; font-size: 1.2rem;">やめる</button>
            <div id="editorTitle" style="color: #fb923c; font-weight: 900; font-size: 1.2rem;">編集</div>
            <button onclick="closeEditor(true)" style="background: #fb923c; color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 2rem; font-weight: 900;">決定</button>
        </div>
        
        <div id="richDisplay" contenteditable="true"></div>

        <div style="margin-top: 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <button onclick="alert('マイクを準備中')" style="background: #38bdf8; color: white; border: none; padding: 1.5rem; border-radius: 1.5rem; font-weight: 900; font-size: 1.2rem;">おしてね</button>
            <button onclick="document.execCommand('delete')" style="background: white; color: #fb923c; border: 4px solid #ffedd5; padding: 1.5rem; border-radius: 1.5rem; font-weight: 900; font-size: 1.2rem;">1字けす</button>
        </div>
    </div>

</body>
</html>
