<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひらがな スケッチブック Pro v34</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sketchbook { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-amber-50 h-screen flex flex-col items-center p-4 overflow-hidden">

    <h1 class="text-2xl font-black text-orange-400 my-1 tracking-tighter">ひらがな スケッチブック</h1>

    <div class="flex-1 w-full max-w-3xl bg-white rounded-3xl shadow-inner border-4 border-orange-100 p-6 mb-2 flex flex-col sketchbook relative">
        <textarea id="output" class="w-full h-full bg-transparent text-6xl font-black text-gray-700 leading-tight resize-none focus:outline-none" placeholder="おしてね を おして はなしてね" spellcheck="false"></textarea>
        <div id="preview" class="text-2xl font-bold text-sky-300 italic pointer-events-none mt-2"></div>
        
        <div class="absolute bottom-4 right-4 flex flex-col items-end">
            <select id="voiceSelect" class="text-[10px] bg-white/90 border-2 border-orange-200 rounded-lg px-2 py-1 mb-1 max-w-[200px] outline-none shadow-sm font-bold">
                <option>こえを さがしています...</option>
            </select>
            <div id="voiceStatus" class="text-[9px] text-gray-400 font-mono leading-tight bg-white/50 px-1 rounded">Total: ?</div>
        </div>
    </div>

    <div class="w-full max-w-4xl grid grid-cols-5 gap-2 mb-6">
        <button id="clearBtn" class="bg-white border-2 border-gray-200 rounded-2xl py-2 active:bg-gray-100 outline-none"><span class="text-3xl">🧹</span></button>
        <button id="backspaceBtn" class="bg-white border-2 border-orange-200 rounded-2xl py-2 active:bg-orange-50 outline-none"><span class="text-3xl">⌫</span></button>
        <button id="newLineBtn" class="bg-white border-2 border-gray-200 rounded-2xl py-2 active:bg-gray-100 outline-none"><span class="text-3xl">⏎</span></button>
        <button id="listenBtn" class="bg-green-400 border-4 border-green-100 rounded-2xl py-2 shadow-lg active:scale-95 outline-none">
            <span class="text-3xl">📢</span><br><span class="text-white text-[9px] font-black italic tracking-tighter">きいてみる</span>
        </button>
        <button id="micBtn" class="bg-sky-400 border-4 border-sky-100 rounded-2xl py-2 shadow-lg active:scale-95 outline-none">
            <span id="btnLabel" class="text-white text-xl font-black italic tracking-tighter">おしてね</span>
        </button>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzhJTL1fmXZFnrSzcM-n_N-ahauuOTTurjJyh5vSP1wUZy_x__C6F-J_YrJQm_n4Y-i/exec'; 
        const output = document.getElementById('output');
        const voiceSelect = document.getElementById('voiceSelect');
        const voiceStatus = document.getElementById('voiceStatus');
        let voices = [];

        function updateVoiceList() {
            const allVoices = window.speechSynthesis.getVoices();
            if (allVoices.length === 0 || allVoices.length === voices.length) return;
            voices = allVoices;

            const currentSelection = voiceSelect.value;
            voiceSelect.innerHTML = '';
            
            // 1. Siri/Premium を最優先
            const priorityVoices = voices.filter(v => v.name.includes('Siri') || v.name.includes('Premium') || v.name.includes('Enhanced'));
            // 2. それ以外の日本語
            const otherJpVoices = voices.filter(v => v.lang.includes('ja') && !priorityVoices.includes(v));
            // 3. 全て
            const otherVoices = voices.filter(v => !priorityVoices.includes(v) && !otherJpVoices.includes(v));

            const combined = [...priorityVoices, ...otherJpVoices, ...otherVoices];

            combined.forEach(v => {
                const option = document.createElement('option');
                option.value = v.name;
                let label = v.name.replace(' (ja-JP)', '').replace(' (ja_JP)', '');
                if (v.name.includes('Siri') || v.name.includes('Premium')) label = "⭐ " + label;
                if (!v.lang.includes('ja')) label = "[他] " + label;
                option.textContent = label;
                voiceSelect.appendChild(option);
            });

            voiceStatus.innerText = `Total Voices: ${voices.length}`;
            if (currentSelection) voiceSelect.value = currentSelection;
        }

        window.speechSynthesis.onvoiceschanged = updateVoiceList;
        setInterval(updateVoiceList, 2000);

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let isRunning = false;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;

            document.getElementById('micBtn').onclick = () => {
                if (!isRunning) recognition.start();
                else recognition.stop();
            };

            document.getElementById('listenBtn').onclick = () => {
                window.speechSynthesis.cancel();
                const selectedName = voiceSelect.value;
                const voice = voices.find(v => v.name === selectedName);

                const uttr = new SpeechSynthesisUtterance(output.value || "こんにちは");
                if (voice) uttr.voice = voice;
                uttr.lang = voice ? voice.lang : 'ja-JP';
                uttr.rate = 0.92; 
                window.speechSynthesis.speak(uttr);
            };

            document.getElementById('clearBtn').onclick = () => { if(confirm("けす？")) output.value = ""; };
            document.getElementById('backspaceBtn').onclick = () => {
                const s = output.selectionStart;
                output.value = output.value.substring(0, s - 1) + output.value.substring(output.selectionEnd);
                output.selectionStart = output.selectionEnd = s - 1;
                output.focus();
            };
            document.getElementById('newLineBtn').onclick = () => {
                const s = output.selectionStart;
                output.value = output.value.substring(0, s) + "\n" + output.value.substring(s);
                output.selectionStart = output.selectionEnd = s + 1;
                output.focus();
            };

            recognition.onstart = () => { isRunning = true; document.getElementById('micBtn').classList.add('bg-red-500', 'pulse-red'); document.getElementById('btnLabel').innerText = "おわる"; };
            recognition.onresult = (event) => {
                let final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                }
                if (final) sendToGas(final);
            };
            recognition.onend = () => { isRunning = false; document.getElementById('micBtn').classList.remove('bg-red-500', 'pulse-red'); document.getElementById('btnLabel').innerText = "おしてね"; };
        }

        async function sendToGas(text) {
            try {
                const res = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}`);
                const data = await res.json();
                if (data.words) {
                    const start = output.selectionStart;
                    const add = data.words.join('');
                    output.value = output.value.substring(0, start) + add + output.value.substring(start);
                    output.selectionStart = output.selectionEnd = start + add.length;
                    output.focus();
                }
            } catch (e) {}
        }
    </script>
</body>
</html>
