<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>学びの足跡 v2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background-color: #fffbeb; }
        .sketchbook { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
        .modal-bg { background-color: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .step-num { position: absolute; top: -6px; left: -6px; width: 28px; height: 28px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; border: 3px solid currentColor; z-index: 20; }
        
        #richDisplay { outline: none; flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .q-label { color: #f97316; font-size: 1rem; font-weight: 900; margin-top: 1rem; display: block; border-bottom: 2px solid #ffedd5; width: fit-content; user-select: none; }
        .a-block { color: #374151; font-size: 1.25rem; font-weight: 900; line-height: 1.5; min-height: 1.2em; word-break: break-all; outline: none; caret-color: #38bdf8; }
        .current-step-box { background: #fff7ed; padding: 10px; border-radius: 15px; border: 3px solid #fdba74; margin-bottom: 8px; }
        .photo-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; border: 3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-3 select-none" onclick="if(audioCtx.state==='suspended') audioCtx.resume();">

    <div class="w-full max-w-3xl flex justify-between items-center mb-3 shrink-0 relative z-10 h-10">
        <button id="historyBtn" class="bg-white border-2 border-orange-200 rounded-full px-4 py-1 shadow-sm active:scale-90 flex items-center gap-1 z-20">
            <span class="text-lg">🎁</span> <span id="label-history" class="text-xs font-black text-orange-400 italic">きろく</span>
        </button>
        <h1 class="absolute left-1/2 -translate-x-1/2 text-xl font-black text-orange-500 tracking-tighter w-max">学びの足跡</h1>
        <div class="flex items-center gap-2 z-20">
            <div class="flex flex-col items-end">
                <span class="text-[8px] font-bold text-orange-300">こえのあんない</span>
                <button id="voiceToggle" data-active="true" class="bg-orange-500 text-white border-2 border-white rounded-full px-3 py-0.5 text-[10px] font-black shadow-sm">ON</button>
            </div>
            <select id="gradeMode" class="bg-orange-400 text-white font-black text-[10px] px-2 py-1 rounded-full border-2 border-white shadow-sm outline-none">
                <option value="0">ひらがな</option><option value="1" selected>1ねんせい</option><option value="2">2ねんせい</option><option value="3">3ねんせい</option><option value="4">4ねんせい</option><option value="5">5ねんせい</option><option value="6">6ねんせい</option><option value="99">ぜんぶ</option>
            </select>
        </div>
    </div>

    <div id="canvas" class="flex-1 w-full max-w-3xl bg-white rounded-[2rem] shadow-inner border-4 border-orange-100 p-5 mb-4 flex flex-col sketchbook relative min-h-0 z-10">
        <div id="stepIndicator" class="text-orange-300 font-black text-[10px] mb-1 italic"></div>
        <div id="currentQuestionBox" class="current-step-box text-lg font-black text-orange-600"></div>
        <div id="richDisplay"></div>
        <div id="photoPreview" class="flex gap-2 py-1 shrink-0 overflow-x-auto"></div>
        <div id="kanjiDisplay" class="shrink-0 w-full text-xs font-bold text-gray-300 border-t border-gray-100 pt-1 italic opacity-60"></div>
    </div>

    <div class="w-full max-w-4xl flex flex-col gap-3 shrink-0 relative z-20">
        <div class="grid grid-cols-4 gap-3">
            <button id="micBtn" class="relative bg-sky-400 border-4 border-sky-100 rounded-2xl py-4 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <div class="step-num text-sky-400">1</div><span id="label-mic" class="text-xl font-black italic">おしてね</span><span class="text-[8px] font-bold opacity-80 uppercase">Talk</span>
            </button>
            <button id="listenBtn" class="relative bg-green-400 border-4 border-green-100 rounded-2xl py-4 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <div class="step-num text-green-400">2</div><span class="text-2xl">📢</span><span class="text-[10px] font-black italic">きいてみる</span>
            </button>
            <button id="cameraBtn" class="relative bg-sky-500 border-4 border-sky-200 rounded-2xl py-4 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <div class="step-num text-sky-500">3</div><span class="text-2xl">📷</span><span class="text-[10px] font-black italic">しゃしん</span><input type="file" id="fileInput" accept="image/*" multiple class="hidden">
            </button>
            <button id="saveBtn" class="relative bg-orange-400 border-4 border-orange-100 rounded-2xl py-4 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <div class="step-num text-orange-400">4</div><span class="text-2xl" id="saveIcon">➡️</span><span id="label-save" class="text-[10px] font-black">つぎへ</span>
            </button>
        </div>
        <div class="grid grid-cols-4 gap-2 px-1 pb-3">
            <button id="backStepBtn" class="bg-white border-2 border-orange-100 rounded-xl py-2 flex items-center justify-center gap-1 shadow-sm"><span class="text-sm">⬅️</span><span class="text-[10px] font-black text-orange-300">もどる</span></button>
            <button id="backspaceBtn" class="bg-white border-2 border-gray-100 rounded-xl py-2 flex items-center justify-center gap-1 shadow-sm text-gray-300"><span class="text-sm">⌫</span><span class="text-[10px] font-black">1字けす</span></button>
            <button id="clearBtn" class="bg-white border-2 border-gray-100 rounded-xl py-2 flex items-center justify-center gap-1 shadow-sm text-gray-200"><span class="text-sm">🧹</span><span class="text-[10px] font-black">全部消す</span></button>
            <button id="newLineBtn" class="bg-white border-2 border-gray-100 rounded-xl py-2 flex items-center justify-center gap-1 shadow-sm text-gray-200"><span class="text-sm">⏎</span><span class="text-[10px] font-black">改行</span></button>
        </div>
    </div>

    <div id="historyModal" class="hidden modal-bg"><div class="bg-white rounded-[2rem] p-6 w-full max-w-lg h-[80vh] flex flex-col shadow-2xl"><h2 class="text-2xl font-black text-orange-400 mb-4 text-center">🎁 過去のきろく</h2><div id="historyList" class="flex-1 overflow-y-auto space-y-4"></div><button onclick="closeModal('historyModal')" class="w-full mt-4 bg-orange-400 text-white py-4 rounded-2xl font-black">とじる</button></div></div>
    <div id="subjectModal" class="hidden modal-bg"><div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl"><h2 class="text-2xl font-black text-orange-400 mb-6 text-center">どの 教科？</h2><div id="subjectGrid" class="grid grid-cols-2 gap-3"></div><button onclick="closeModal('subjectModal')" class="w-full mt-6 text-gray-400 font-bold">やめる</button></div></div>
    <div id="confirmModal" class="hidden modal-bg"><div class="bg-white rounded-3xl p-10 w-full max-w-sm text-center border-8 border-orange-50"><p id="confirmText" class="text-xl font-black text-gray-700 mb-8"></p><div class="flex gap-4"><button onclick="closeModal('confirmModal')" class="flex-1 bg-gray-100 py-4 rounded-xl font-bold text-gray-400">いいえ</button><button id="execSave" class="flex-1 bg-orange-500 py-4 rounded-xl font-black text-white shadow-lg">はい！</button></div></div></div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxE14tNshFIqZHwzhyGQtRDeSazD9aPex9Tm0gIGJjmUvd8jAiFN-bkQyNIt_D9cV_/exec';
        const QUESTIONS = ["①きょうの めあて", "②できたこと、うまくいったこと", "③むずかしかったこと", "④つぎのじかんに やってみたいこと"];
        const KANJI_LISTS = { 1: "一右雨円王音下火花貝学気九休玉金空月犬見五口校左三山子四糸字耳七車手十出女小上森人水正生青夕石赤千川先早草足村大男竹中虫町天田土二日入年白八百文木本名目立力林六", 2: "引羽雲園遠何科夏家歌画回会海絵外角楽活間丸岩顔汽記帰弓牛魚京強教近兄形計元言原戸古午後語工公広交光考行高黄合谷国黒今才細作算止市矢姉思紙寺自時室社弱首秋週春書少場色食心新親図数西声星晴切雪船線前組走多太体台地池知茶昼長鳥朝直通弟店点電刀冬當東答頭同道読内南肉馬売買麦半番父風分聞米歩母方北毎妹万明鳴毛門夜野友用曜来里理話" };

        let state = { step: 0, masterData: [], images: [], voiceEnabled: true };
        let lastCaretPos = 0;

        // 音響システム
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        }
        const sfx = { click: () => playSfx(600, 'sine', 0.1), pop: () => playSfx(800, 'sine', 0.1), save: () => playSfx(1200, 'sine', 0.5) };

        const saveToLocal = () => localStorage.setItem('furiBox_v25', JSON.stringify(state));
        const loadFromLocal = () => { const s = localStorage.getItem('furiBox_v25'); if(s) state = JSON.parse(s); };

        function speak(t) { if(!state.voiceEnabled) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t.replace(/^[①-④]\s*/, '')); u.lang='ja-JP'; u.rate=0.8; window.speechSynthesis.speak(u); }

        function getCaretCharacterOffsetWithin(element) {
            let offset = 0; const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0); const preCaretRange = range.cloneRange();
                preCaretRange.selectNodeContents(element); preCaretRange.setEnd(range.endContainer, range.endOffset);
                offset = preCaretRange.toString().length;
            }
            return offset;
        }

        function renderDisplay() {
            const lv = parseInt(gradeMode.value);
            const allowed = (l) => { let s=""; for(let i=1;i<=l;i++) s+=KANJI_LISTS[i]||""; return s; }(lv);
            let html = ""; let fullText = "";
            for (let i = 0; i <= state.step; i++) {
                html += `<span class="q-label">${QUESTIONS[i]}</span>`;
                const stepChars = state.masterData.filter(c => c.step === i);
                html += `<div id="step-area-${i}" class="a-block" ${i===state.step?'contenteditable="true"':''}>`;
                stepChars.forEach(c => {
                    if (c.s === "\n") html += "<br>";
                    else {
                        let s = (lv!==99 && (c.s >= '\u4e00' && c.s <= '\u9faf') && !allowed.includes(c.s)) ? (c.f || c.s) : c.s;
                        html += s;
                    }
                    fullText += c.s;
                });
                html += `</div>`;
            }
            document.getElementById('richDisplay').innerHTML = html;
            document.getElementById('kanjiDisplay').innerText = fullText;
            
            const area = document.getElementById(`step-area-${state.step}`);
            if(area) {
                area.onblur = () => { lastCaretPos = getCaretCharacterOffsetWithin(area); };
                area.oninput = () => {
                    const text = area.innerText;
                    const others = state.masterData.filter(c => c.step !== state.step);
                    const current = []; for(let char of text) current.push({s:char, f:char, step:state.step});
                    state.masterData = [...others, ...current]; saveToLocal();
                };
            }
            document.getElementById('richDisplay').scrollTop = document.getElementById('richDisplay').scrollHeight;
        }

        document.getElementById('backspaceBtn').onclick = () => {
            sfx.click(); const area = document.getElementById(`step-area-${state.step}`);
            const pos = getCaretCharacterOffsetWithin(area);
            const stepChars = state.masterData.filter(c => c.step === state.step);
            if(pos > 0) {
                stepChars.splice(pos - 1, 1);
                state.masterData = [...state.masterData.filter(c => c.step !== state.step), ...stepChars];
                renderDisplay(); saveToLocal();
            }
        };

        document.getElementById('newLineBtn').onclick = () => {
            sfx.click(); const area = document.getElementById(`step-area-${state.step}`);
            const pos = getCaretCharacterOffsetWithin(area);
            const stepChars = state.masterData.filter(c => c.step === state.step);
            stepChars.splice(pos, 0, {s: "\n", f: "", step: state.step});
            state.masterData = [...state.masterData.filter(c => c.step !== state.step), ...stepChars];
            renderDisplay(); saveToLocal();
        };

        document.getElementById('cameraBtn').onclick = () => { sfx.click(); document.getElementById('fileInput').click(); };
        document.getElementById('fileInput').onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); const max = 600;
                        let w = img.width, h = img.height;
                        if(w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        state.images.push(canvas.toDataURL('image/jpeg', 0.6));
                        renderPhotos(); saveToLocal();
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });
        };
        function renderPhotos() {
            document.getElementById('photoPreview').innerHTML = state.images.map((src, i) => `<img src="${src}" class="photo-thumb" onclick="sfx.pop(); state.images.splice(${i},1); renderPhotos();">`).join('');
        }

        let isRunning = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const rec = new SpeechRecognition(); rec.lang = 'ja-JP'; rec.interimResults = true;
            document.getElementById('micBtn').onclick = () => { sfx.click(); if(!isRunning) { 
                const area = document.getElementById(`step-area-${state.step}`);
                lastCaretPos = getCaretCharacterOffsetWithin(area);
                rec.start(); 
            } else rec.stop(); };
            rec.onstart = () => { isRunning = true; document.getElementById('micBtn').classList.add('bg-red-500', 'pulse-red'); };
            rec.onresult = (e) => {
                let final = ''; for (let i = e.resultIndex; i < e.results.length; i++) if (e.results[i].isFinal) final += e.results[i][0].transcript;
                if (final) sendToGas(final);
            };
            rec.onend = () => { isRunning = false; document.getElementById('micBtn').classList.remove('bg-red-500', 'pulse-red'); };
        }

        async function sendToGas(text) {
            try {
                const res = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}`);
                const d = await res.json();
                if (d.words_all) {
                    const newChars = [];
                    d.words_all.forEach(w => { for(let i=0; i<w.surface.length; i++) newChars.push({s:w.surface[i], f:i===0?w.furigana:"", step:state.step}); });
                    const stepChars = state.masterData.filter(c => c.step === state.step);
                    stepChars.splice(lastCaretPos, 0, ...newChars);
                    state.masterData = [...state.masterData.filter(c => c.step !== state.step), ...stepChars];
                    lastCaretPos += newChars.length;
                    renderDisplay(); saveToLocal();
                }
            } catch (e) {}
        }

        document.getElementById('saveBtn').onclick = () => { sfx.click(); if (state.step < 3) { state.step++; saveToLocal(); initStep(); } else openSubjectModal(); };
        document.getElementById('backStepBtn').onclick = () => { sfx.pop(); if (state.step > 0) { state.step--; saveToLocal(); initStep(); } };
        document.getElementById('listenBtn').onclick = () => { sfx.click(); speak(state.masterData.filter(c=>c.step===state.step).map(c=>c.s).join('') || "なにかお話ししてね"); };
        document.getElementById('historyBtn').onclick = () => { sfx.pop(); showHistory(); };
        document.getElementById('clearBtn').onclick = () => { if(confirm("全部消す？")) { localStorage.removeItem('furiBox_v25'); location.reload(); } };

        function initStep() {
            document.getElementById('stepIndicator').innerText = `STEP ${state.step + 1} / 4`;
            document.getElementById('currentQuestionBox').innerText = QUESTIONS[state.step];
            document.getElementById('saveIcon').innerText = (state.step === 3) ? "💰" : "➡️";
            speak(QUESTIONS[state.step]); renderDisplay(); renderPhotos();
        }
        function openSubjectModal() {
            sfx.pop(); const g = document.getElementById('subjectGrid'); g.innerHTML = "";
            ["国語", "算数", "生活", "音楽", "図工", "体育", "道徳"].forEach(s => {
                const b = document.createElement('button'); b.className = "p-4 rounded-xl text-white bg-orange-400 font-black";
                b.innerText = s; b.onclick = () => { window.selSub = s; document.getElementById('confirmText').innerText = s + "に記録する？"; document.getElementById('subjectModal').classList.add('hidden'); document.getElementById('confirmModal').classList.remove('hidden'); };
                g.appendChild(b);
            });
            document.getElementById('subjectModal').classList.remove('hidden');
        }
        function showHistory() {
            const l = document.getElementById('historyList'); const d = JSON.parse(localStorage.getItem('fHistory') || '[]');
            l.innerHTML = d.length ? "" : "<p class='text-center text-gray-400 py-10'>きろくなし</p>";
            d.forEach(item => {
                const div = document.createElement('div'); div.className = "bg-orange-50 p-4 rounded-2xl border-l-4 border-orange-400";
                div.innerHTML = `<div class='text-[10px] text-orange-300'>${item.date} [${item.subject}]</div><p class='text-sm font-bold'>${item.text}</p>`;
                l.appendChild(div);
            });
            document.getElementById('historyModal').classList.remove('hidden');
        }
        document.getElementById('execSave').onclick = () => {
            sfx.save(); const h = JSON.parse(localStorage.getItem('fHistory') || '[]');
            let full = ""; for(let i=0; i<4; i++) { const t = state.masterData.filter(c=>c.step===i).map(c=>c.s).join(''); if(t) full += QUESTIONS[i]+"\n"+t+"\n\n"; }
            h.unshift({ date: new Date().toLocaleString(), subject: window.selSub, text: full.trim(), imgs: [...state.images] });
            localStorage.setItem('fHistory', JSON.stringify(h)); localStorage.removeItem('furiBox_v25'); location.reload();
        };
        function closeModal(id) { sfx.click(); document.getElementById(id).classList.add('hidden'); }
        window.onload = () => { loadFromLocal(); initStep(); };
    </script>
</body>
</html>
