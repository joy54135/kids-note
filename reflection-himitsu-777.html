<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ふりかえり たからばこ v47</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .sketchbook { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
        .suck-in { transition: all 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045); transform: scale(0) translate(200px, 400px) rotate(20deg) !important; opacity: 0; }
        .modal-bg { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 1000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .step-num { position: absolute; top: -6px; left: -6px; width: 28px; height: 28px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; border: 3px solid currentColor; z-index: 20; }
        #richDisplay { caret-color: #38bdf8; outline: none; min-height: 100%; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body class="bg-amber-50 p-3 select-none">

    <div class="w-full max-w-3xl flex justify-between items-center mb-2 shrink-0 relative z-10">
        <button id="historyBtn" class="bg-white border-2 border-orange-200 rounded-full px-5 py-2 shadow-sm active:scale-90 transition-all flex items-center gap-1">
            <span class="text-2xl">🎁</span> <span id="label-history" class="text-sm font-black text-orange-400 italic">きろく</span>
        </button>
        <h1 id="label-title" class="text-xl font-black text-orange-400 tracking-tighter text-center flex-1">ふりかえり たからばこ</h1>
        <select id="gradeMode" class="bg-orange-400 text-white font-black text-[10px] px-4 py-2 rounded-full border-2 border-white shadow-sm outline-none appearance-none">
            <option value="0">ひらがなとカタカナ</option>
            <option value="1" selected>1年生までの漢字</option>
            <option value="2">2年生までの漢字</option>
            <option value="3">3年生までの漢字</option>
            <option value="4">4年生までの漢字</option>
            <option value="5">5年生までの漢字</option>
            <option value="6">6年生までの漢字</option>
            <option value="99">ぜんぶの漢字</option>
        </select>
    </div>

    <div id="canvas" class="flex-1 w-full max-w-3xl bg-white rounded-3xl shadow-inner border-4 border-orange-100 p-6 mb-4 flex flex-col sketchbook relative min-h-0 transition-all duration-700 z-10">
        <div id="outputContainer" class="flex-1 overflow-y-auto min-h-0">
             <div id="richDisplay" contenteditable="true" class="text-5xl font-black text-gray-700 leading-tight w-full"></div>
        </div>
        <div id="kanjiDisplay" class="shrink-0 w-full text-lg font-bold text-gray-300 border-t border-gray-100 pt-2 italic opacity-60"></div>
        <div id="preview" class="shrink-0 text-2xl font-bold text-sky-300 italic pointer-events-none mt-1"></div>
    </div>

    <div class="w-full max-w-4xl flex flex-col gap-3 shrink-0 relative z-20">
        <div class="grid grid-cols-3 gap-4">
            <button id="micBtn" class="relative bg-sky-400 border-4 border-sky-100 rounded-2xl py-5 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <div class="step-num text-sky-400">1</div>
                <span id="label-mic" class="text-3xl font-black italic">おしてね</span>
                <span id="label-mic-sub" class="text-xs font-bold opacity-90 uppercase mt-1">お話しする</span>
            </button>
            <button id="listenBtn" class="relative bg-green-400 border-4 border-green-100 rounded-2xl py-5 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <div class="step-num text-green-400">2</div>
                <span class="text-4xl mb-1">📢</span>
                <span id="label-listen" class="text-sm font-black italic text-center">きいてみる</span>
            </button>
            <button id="saveBtn" class="relative bg-orange-400 border-4 border-orange-100 rounded-2xl py-5 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <div class="step-num text-orange-400">3</div>
                <span class="text-4xl mb-1">💰</span>
                <span id="label-save" class="text-sm font-black">ほぞんする</span>
            </button>
        </div>

        <div class="grid grid-cols-3 gap-4 px-4 pb-4">
            <button id="clearBtn" class="bg-white border-2 border-gray-200 rounded-2xl py-2 active:bg-gray-100 flex items-center justify-center gap-3 shadow-sm">
                <span class="text-2xl">🧹</span><span id="label-clear" class="text-sm font-black text-gray-400">全部消す</span>
            </button>
            <button id="backspaceBtn" class="bg-white border-2 border-orange-100 rounded-2xl py-2 active:bg-orange-50 flex items-center justify-center gap-3 shadow-sm">
                <span class="text-2xl">⌫</span><span id="label-back" class="text-sm font-black text-orange-400 text-center">1字けす</span>
            </button>
            <button id="newLineBtn" class="bg-white border-2 border-gray-200 rounded-2xl py-2 active:bg-gray-100 flex items-center justify-center gap-3 shadow-sm">
                <span class="text-2xl">⏎</span><span id="label-line" class="text-sm font-black text-gray-400 text-center">改行</span>
            </button>
        </div>
    </div>

    <div id="subjectModal" class="hidden modal-bg">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h2 id="label-modal-title" class="text-3xl font-black text-orange-400 mb-8 text-center italic">どの きょうか？</h2>
            <div id="subjectGrid" class="grid grid-cols-2 gap-4 max-h-[50vh] overflow-y-auto p-1"></div>
            <button id="label-modal-cancel" onclick="closeModal('subjectModal')" class="w-full mt-8 text-gray-400 text-lg font-bold">やめる</button>
        </div>
    </div>

    <div id="confirmModal" class="hidden modal-bg">
        <div class="bg-white rounded-3xl p-10 w-full max-w-sm shadow-2xl text-center border-8 border-orange-100">
            <p id="confirmText" class="text-3xl font-black text-gray-700 mb-10 leading-relaxed italic"></p>
            <div class="flex gap-4">
                <button id="label-confirm-no" onclick="closeModal('confirmModal')" class="flex-1 bg-gray-100 py-5 rounded-2xl text-2xl font-bold text-gray-400">いいえ</button>
                <button id="execSave" class="flex-1 bg-orange-500 py-5 rounded-2xl text-2xl font-black text-white shadow-lg">はい！</button>
            </div>
        </div>
    </div>

    <div id="historyDetailModal" class="hidden modal-bg">
        <div class="bg-amber-50 rounded-3xl p-8 w-full max-w-2xl h-[85vh] shadow-2xl flex flex-col border-4 border-amber-200">
            <h2 id="historyDetailTitle" class="text-3xl font-black text-amber-600 mb-6 text-center italic"></h2>
            <div id="historyDetailList" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
            <button id="label-history-back" onclick="closeModal('historyDetailModal')" class="mt-6 bg-amber-400 text-white py-5 rounded-2xl font-black text-xl shadow-md">もどる</button>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxE14tNshFIqZHwzhyGQtRDeSazD9aPex9Tm0gIGJjmUvd8jAiFN-bkQyNIt_D9cV_/exec';
        
        // 音響システム
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type, duration, startTime = 0) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime + startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + startTime); 
            osc.stop(audioCtx.currentTime + startTime + duration);
        }
        const sfx = {
            click: () => playSfx(600, 'sine', 0.1),
            pop: () => { playSfx(400, 'sine', 0.1); setTimeout(() => playSfx(800, 'sine', 0.1), 50); },
            // ★ 新・キラキラ保存音（アルペジオ）
            save: () => {
                const freqs = [1000, 1500, 2000, 2500];
                freqs.forEach((f, i) => {
                    playSfx(f, 'sine', 0.4, i * 0.05);
                });
            }
        };

        const KANJI_LISTS = {
            1: "一右雨円王音下火花貝学気九休玉金空月犬見五口校左三山子四糸字耳七車手十出女小上森人水正生青夕石赤千川先早草足村大男竹中虫町天田土二日入年白八百文木本名目立力林六",
            2: "引羽雲園遠何科夏家歌画回会海絵外角楽活間丸岩顔汽記帰弓牛魚京強教近兄形計元言原戸古午後語工公広交光考行高黄合谷国黒今才細作算止市矢姉思紙寺自時室社弱首秋週春書少場色食心新親図数西声星晴切雪船線前組走多太体台地池知茶昼長鳥朝直通弟店点電刀冬当東答頭同道読内南肉馬売買麦半番父風分聞米歩母方北毎妹万明鳴毛門夜野友用曜来里理話",
            3: "悪安暗医委意育員院飲運泳駅央横屋温化荷界開階寒感漢館岸起期客究急級宮球去橋業曲局銀区苦具君係軽血決研県庫湖向幸港号根祭皿仕死使始指歯詩次事持式実写者主守取酒受州拾終習集住重宿所暑助昭消商章勝乗植申身神真深進世整昔全相送想息速族他打対待代第題炭短談着注柱丁帳調追定庭笛鉄転都度投豆島湯登等動童農波配倍箱畑発反坂板皮悲美鼻筆氷表秒病品負部服福物平返勉放味命面問役薬由油有遊予羊洋葉陽様落流旅両緑礼列練路和",
            4: "愛案以衣位茨印英栄媛塩岡億加果貨課芽賀改械害街各覚潟完官管関観願岐希旗器機議求泣給挙漁共協鏡競極熊訓軍郡群径景芸欠結建健験固功好香候康佐差菜最埼材崎昨札刷察参産散残氏司試児治滋辞鹿失借種周祝順初松笑唱焼照城縄臣信井成省清静席積折節説浅戦選然争倉巣束側続卒孫帯隊達単置仲沖兆低底的な典伝徒努灯働特徳栃木奈梨熱念敗梅博阪飯飛必票標不夫付府阜富副兵別辺変便包法望牧末満未民無約勇要養浴利陸良料量輪類令冷例連老労録",
            5: "圧囲移因永営衛易益液演応往桜可仮価河過快解格確額刊幹慣眼紀基寄規喜技義逆久旧救居許境均禁句型経潔件険検限現減故個護効厚耕航鉱構興講告混査再災妻採際在財罪殺雑酸賛士支史志枝師資飼示似識質舎謝授修述術準序招証象賞条状常表情織職制性政勢精製税責績接設絶祖素総造像増則測属率損貸態団断築貯張停提程適統堂銅導得毒独任燃能破犯判版比肥非費備評貧布婦武復複仏粉編弁保墓報豊防貿暴脈務夢迷綿輸余容略留領歴",
            6: "胃異遺域宇映延沿恩我灰拡革閣割株干巻看簡危机揮貴疑吸供胸郷勤筋系敬警劇激穴券絹権憲源厳己呼誤后孝皇紅降鋼刻穀骨困砂座済裁策冊蚕至私姿視詞誌磁射捨尺若樹収宗就衆従縦縮熟純処署諸除承将傷障蒸針仁垂推寸盛聖誠舌宣専泉洗染銭善奏窓創装層操蔵臓存尊退宅担探誕段暖値宙忠著庁頂腸潮賃痛敵展討党糖届難乳認納脳派拝背肺俳班晩否批秘俵腹奮並陛閉片補暮宝訪亡忘棒枚幕密盟模訳郵優預幼欲翌乱卵覧裏律臨朗論"
        };

        const HIRA_MAP = {
            "記録": "きろく", "保存": "ほぞん", "宝箱": "たからばこ", "全部消す": "ぜんぶ消す", "お話しする": "おはなしする", 
            "きいてみる": "きいてみる", "改行": "かいぎょう", "国語": "こくご", "算数": "さんすう", "社会": "しゃかい", "理科": "りか",
            "生活": "せいかつ", "音楽": "おんがく", "図工": "ずこう", "体育": "たいいく", "道徳": "どうとく", "外国語": "がいこくご",
            "戻る": "もどる", "辞める": "やめる", "おしてね": "おしてね", "キャンセル": "きゃんせる"
        };

        const ricDisplay = document.getElementById('richDisplay');
        const kanjiDisplay = document.getElementById('kanjiDisplay');
        const preview = document.getElementById('preview');
        const canvas = document.getElementById('canvas');
        const gradeMode = document.getElementById('gradeMode');
        
        let fullConversation = []; 
        let currentKanjiText = ""; 
        let isHistoryView = false;
        let isRunning = false;

        function isKanji(ch) { return (ch >= '\u4e00' && ch <= '\u9faf'); }
        function getGradeLevel() { return parseInt(gradeMode.value); }
        function getAllowedKanji(lv) {
            let list = "";
            for (let i = 1; i <= lv; i++) list += KANJI_LISTS[i] || "";
            return list;
        }

        function smartConvert(text, lv) {
            if (lv === 99) return text;
            const allowed = getAllowedKanji(lv);
            let result = text;
            for (let [kanji, hira] of Object.entries(HIRA_MAP)) {
                if (result.includes(kanji)) {
                    let canKeep = true;
                    for (let char of kanji) { if (isKanji(char) && !allowed.includes(char)) canKeep = false; }
                    if (!canKeep) result = result.replace(new RegExp(kanji, 'g'), hira);
                }
            }
            return result;
        }

        function updateUI() {
            const lv = getGradeLevel();
            const set = (id, txt) => { const el = document.getElementById(id); if (el) el.innerText = smartConvert(txt, lv); };
            set("label-history", "記録");
            set("label-title", "ふりかえり たからばこ");
            set("label-mic", isRunning ? "キャンセル" : "おしてね");
            set("label-mic-sub", "お話しする");
            set("label-listen", "きいてみる");
            set("label-save", "保存する");
            set("label-clear", "全部消す");
            set("label-back", "1字けす");
            set("label-line", "改行");
            set("label-modal-title", isHistoryView ? "どれを 見たい？" : "どの 教科？");
            set("label-modal-cancel", "やめる");
            set("label-confirm-no", "いいえ");
            set("label-history-back", "戻る");
        }

        function renderDisplay() {
            const lv = getGradeLevel();
            let html = "";
            const allowed = getAllowedKanji(lv);
            fullConversation.forEach(word => {
                if (word.surface === "\n") { html += "<br>"; return; }
                const furigana = word.furigana || word.surface;
                if (lv === 0) html += furigana;
                else if (lv === 99) html += word.surface;
                else {
                    let canShow = true;
                    for (let char of word.surface) { if (isKanji(char) && !allowed.includes(char)) canShow = false; }
                    html += canShow ? word.surface : furigana;
                }
            });
            ricDisplay.innerHTML = html;
            kanjiDisplay.innerText = currentKanjiText;
            updateUI();
        }

        gradeMode.onchange = renderDisplay;

        function openSubjectModal(forHistory) {
            sfx.pop();
            isHistoryView = forHistory;
            const lv = getGradeLevel();
            const grid = document.getElementById('subjectGrid');
            grid.innerHTML = "";
            let subjects = lv >= 3 || lv === 99 ? 
                ["国語", "算数", "社会", "理科", "音楽", "図工", "体育", "道徳", "外国語"] : 
                ["国語", "算数", "生活", "音楽", "図工", "体育", "道徳"];
            subjects.forEach(s => {
                const btn = document.createElement('button');
                btn.className = "p-5 rounded-3xl font-black text-2xl shadow-sm active:scale-95 transition-all text-white " + 
                    { "国語":"bg-pink-400", "算数":"bg-blue-400", "社会":"bg-orange-800", "理科":"bg-green-700", "生活":"bg-green-400", "音楽":"bg-yellow-400", "図工":"bg-purple-400", "体育":"bg-red-400", "道徳":"bg-orange-400", "外国語":"bg-indigo-400" }[s];
                btn.innerText = smartConvert(s, lv);
                btn.onclick = () => onSubjectClick(s);
                grid.appendChild(btn);
            });
            updateUI();
            document.getElementById('subjectModal').classList.remove('hidden');
        }

        function onSubjectClick(subj) {
            sfx.click();
            if (isHistoryView) { showHistory(subj); }
            else {
                window.selectedSubj = subj;
                const lv = getGradeLevel();
                const suffix = (lv <= 2) ? "に ほぞん する？" : "に 保存する？";
                document.getElementById('confirmText').innerText = smartConvert(subj, lv) + suffix;
                document.getElementById('subjectModal').classList.add('hidden');
                document.getElementById('confirmModal').classList.remove('hidden');
            }
        }

        document.getElementById('saveBtn').onclick = () => { if(ricDisplay.innerText.trim()) openSubjectModal(false); };
        document.getElementById('historyBtn').onclick = () => openSubjectModal(true);

        document.getElementById('execSave').onclick = () => {
            sfx.save(); // キラキラ音
            closeModal('confirmModal');
            canvas.classList.add('suck-in');
            setTimeout(() => {
                const history = JSON.parse(localStorage.getItem('furiHistory') || '[]');
                history.unshift({ date: new Date().toLocaleString('ja-JP'), subject: window.selectedSubj, text: ricDisplay.innerText });
                localStorage.setItem('furiHistory', JSON.stringify(history));
                fullConversation = []; currentKanjiText = ""; ricDisplay.innerText = ""; renderDisplay();
                canvas.classList.remove('suck-in');
            }, 850);
        };

        function showHistory(subject) {
            const list = document.getElementById('historyDetailList');
            const data = JSON.parse(localStorage.getItem('furiHistory') || '[]');
            const filtered = data.filter(item => item.subject === subject);
            document.getElementById('historyDetailTitle').innerText = `🎁 ${smartConvert(subject, getGradeLevel())}の きろく`;
            list.innerHTML = filtered.length ? "" : "<p class='text-center mt-20 text-gray-400 font-bold'>きろくが ありません</p>";
            filtered.forEach(item => {
                const d = document.createElement('div');
                d.className = "bg-white p-5 rounded-3xl shadow-sm border-l-8 border-orange-400 mb-4";
                d.innerHTML = `<div class='text-[10px] text-gray-300'>${item.date}</div><p class='text-2xl font-black text-gray-700'>${item.text.replace(/\n/g, '<br>')}</p>`;
                list.appendChild(d);
            });
            document.getElementById('historyDetailModal').classList.remove('hidden');
        }

        function closeModal(id) { sfx.click(); document.getElementById(id).classList.add('hidden'); }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP'; recognition.interimResults = true;
            document.getElementById('micBtn').onclick = () => { sfx.click(); if (!isRunning) recognition.start(); else recognition.stop(); };
            document.getElementById('listenBtn').onclick = () => {
                sfx.click(); window.speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(currentKanjiText || ricDisplay.innerText || "なにか かいてね");
                uttr.lang = 'ja-JP'; uttr.rate = 0.95; window.speechSynthesis.speak(uttr);
            };
            document.getElementById('clearBtn').onclick = () => { sfx.click(); if(confirm("全部消す？")) { fullConversation = []; currentKanjiText = ""; ricDisplay.innerText = ""; renderDisplay(); } };
            document.getElementById('backspaceBtn').onclick = () => { sfx.click(); fullConversation.pop(); currentKanjiText = currentKanjiText.slice(0, -1); renderDisplay(); };
            document.getElementById('newLineBtn').onclick = () => { sfx.click(); fullConversation.push({surface: "\n", furigana: ""}); currentKanjiText += "\n"; renderDisplay(); };
            
            recognition.onstart = () => { isRunning = true; document.getElementById('micBtn').classList.add('bg-red-500', 'pulse-red'); updateUI(); };
            recognition.onresult = (event) => {
                let interim = ''; let final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript; else interim += event.results[i][0].transcript;
                }
                if (interim) preview.innerText = interim;
                if (final) { preview.innerText = "へんかん中..."; currentKanjiText += final; sendToGas(final); }
            };
            recognition.onend = () => { isRunning = false; document.getElementById('micBtn').classList.remove('bg-red-500', 'pulse-red'); updateUI(); preview.innerText = ""; };
        }

        async function sendToGas(text) {
            try {
                const res = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}`);
                const data = await res.json();
                if (data.words_all) {
                    fullConversation = [...fullConversation, ...data.words_all];
                    renderDisplay();
                }
            } catch (e) {}
        }
        renderDisplay();
    </script>
</body>
