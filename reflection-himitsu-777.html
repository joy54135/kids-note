    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { height: 100dvh; background-color: #fffbeb; margin: 0; display: flex; flex-direction: column; overflow: hidden; font-family: sans-serif; }
        
        /* メインコンテナ：演出用 */
        .main-container { 
            flex: 1; display: flex; flex-direction: column; padding: 0.8rem; gap: 0.5rem; min-height: 0; 
            transition: all 0.7s cubic-bezier(0.6, -0.28, 0.735, 0.045); 
            transform-origin: left top; 
        }
        .suck-in { transform: scale(0) translate(-20%, -20%) rotate(-10deg); opacity: 0; pointer-events: none; }

        /* タイルグリッド */
        .tiles-grid { 
            flex: 1; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 0.6fr 1.2fr 0.6fr 1fr; 
            gap: 0.6rem; 
            min-height: 0; 
        }
        
        .tile-btn { background: white; border: 4px solid #ffedd5; border-radius: 2rem; padding: 0.8rem; display: flex; flex-direction: column; text-align: left; position: relative; transition: all 0.2s; min-height: 0; }
        .tile-btn:active { background: #fff7ed; transform: scale(0.98); }
        
        .tile-label { font-size: 0.75rem; font-weight: 900; line-height: 1.2; flex-shrink: 0; }
        .tile-preview { flex: 1; color: #4b5563; font-weight: 900; overflow: hidden; font-size: 1.4rem; line-height: 1.3; word-break: break-all; margin-top: 0.1rem; min-height: 0; }
        
        .border-blue { border-color: #bae6fd !important; }
        .border-green { border-color: #d9f99d !important; }
        .border-orange { border-color: #ffedd5 !important; }

        /* 入力フォーム */

        #authOverlay.active { display: flex; }
        .auth-card { background: white; border-radius: 3rem; padding: 2.5rem; width: 100%; max-width: 26rem; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        input { border: 4px solid #fed7aa; border-radius: 1.5rem; padding: 1.6rem 1rem; width: 100%; font-size: 1.5rem; font-weight: 900; text-align: center; outline: none; margin-bottom: 1.2rem; line-height: 1; }
        
        /* 編集画面（エディタ）：キーボード対応のため高さをJSで制御 */

        /* モーダル */
        .modal-bg { position: fixed; inset: 0; display: none; flex-direction: column; padding: 1.2rem; z-index: 888888; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(10px); justify-content: center; align-items: center; }
        .modal-bg.active { display: flex; }
        .modal-content-wide { background: #fffbeb; border-radius: 3rem; padding: 1rem; width: 96%; max-width: 75rem; border: 8px solid #ffedd5; position: relative; max-height: 94vh; display: flex; flex-direction: column; }
        .modal-content { background: white; border-radius: 3rem; padding: 2rem; width: 100%; max-width: 32rem; border: 8px solid #ffedd5; position: relative; max-height: 90vh; overflow-y: auto; }
        
        .history-card { background: white; border: 6px solid #ffedd5; border-radius: 2.5rem; padding: 1.2rem; position: relative; display: flex; flex-direction: column; transition: transform 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .mini-tiles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.8rem; flex: 1; }
        .mini-tile { background: #fffaf0; border: 2px solid #ffedd5; border-radius: 1rem; padding: 0.6rem; min-height: 60px; position: relative; overflow: hidden; }
        .mini-tile-full { grid-column: span 2; min-height: 45px; }

        .badge { position: absolute; bottom: 0.5rem; right: 0.5rem; font-size: 2.8rem; pointer-events: none; }
        .mini-badge { position: absolute; bottom: 0.2rem; right: 0.2rem; font-size: 1.5rem; }
        
        #richDisplay { flex: 1; background: white; border: 4px solid #ffedd5; border-radius: 2.5rem; padding: 1.5rem; font-size: 2.2rem; font-weight: 900; outline: none; overflow-y: auto; color: #374151; line-height: 1.2; word-break: break-all; min-height: 0; }
        .btn-active-state:active { opacity: 0.8; transform: scale(0.95); }
        
        .photo-grid-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; height: 100%; min-height: 0; }
        .photo-container { position: relative; background: white; border: 2px solid #ffedd5; border-radius: 1rem; overflow: visible; height: 100%; min-height: 0; }
        .photo-img-main { width: 100%; height: 100%; object-fit: cover; border-radius: 0.8rem; }
        .delete-btn { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; border: 3px solid white; z-index: 100; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }

        .mic-recording { animation: mic-pulse 1.5s infinite; background-color: #ef4444 !important; border-bottom: 8px solid #b91c1c !important; }
        @keyframes mic-pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        .subject-grid, .grade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        .subject-btn, .grade-btn { background-color: #fb923c; color: white; padding: 1.2rem; border-radius: 1.5rem; font-weight: 900; font-size: 1.2rem; box-shadow: 0 4px 0 #ea580c; text-align: center; }
        .grade-btn { background-color: #0ea5e9; box-shadow: 0 4px 0 #0284c7; }
        .grade-btn-active { background-color: #ef4444 !important; box-shadow: 0 4px 0 #b91c1c !important; }
        
        .footer-buttons { flex-shrink: 0; display: flex; gap: 0.6rem; padding-bottom: 0.5rem; }
    </style>

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSaveSfx() {
            const freqs = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98];
            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.08));
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime + (i * 0.08));
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.08) + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (i * 0.08));
                osc.stop(audioCtx.currentTime + (i * 0.08) + 0.5);
            });
        }

            4: "愛案以衣位茨印英栄媛塩岡億加果貨課芽賀改械害街各覚潟完官管関観願岐希旗器機議求泣給挙漁共協鏡競極熊訓軍郡群径景芸欠結建健験固功好香候康佐差菜最埼材崎昨札刷察参産散残氏司試児治滋辞鹿失借種周祝順初松笑唱焼照城縄臣信井成省清静席積折節説浅戦選然争倉巣束側続卒孫帯隊達単置仲沖兆低底的な典伝徒努灯働特徳栃木奈梨熱念敗梅博阪飯飛必票標不夫付府阜富副兵別辺変便包法望牧末満未民無約勇要養浴利陸良料量輪類令冷例連老労録",
            5: "圧囲移因永営衛易益液演応往桜可仮価河過快解格確額刊幹慣眼紀基寄規喜技義逆久旧救居許境均禁句型経潔件険検限現減故個護効厚耕航鉱構興講告混査再災妻採際在財罪殺雑酸賛士支史志枝师资飼示似識質舎謝授修述術準序招証象賞条状常表情織職制性政勢精製税責績接設絶祖素総造像増則测属率損貸態団断築貯張停提程適統堂銅導得毒独任燃能破犯判版比肥非費備評貧布婦武復複仏粉編弁保墓报豊防貿暴脈務夢迷綿輸余容略留領歴",
            6: "胃異遺域宇映延沿順我灰拡革閣割株干巻看簡危机揮貴疑吸供胸郷勤筋系敬警劇激穴券絹権憲源厳己呼誤后孝皇紅降鋼刻穀骨困砂座済裁策冊蚕至私姿視詞誌磁射捨尺若樹収宗就衆従縦縮熟純処署諸除承将傷障蒸針仁垂推寸盛聖誠舌宣専泉洗染銭善奏窓創装層操蔵臓存尊退宅担探誕段暖値宙忠著庁頂腸潮賃痛敵展討党糖届難乳認納脳派拝背肺俳班晩否批秘俵腹奮並陛閉片補暮宝訪亡忘棒枚幕密盟模訳郵優預幼欲翌乱卵覧裏律臨朗論"
        };

        const GRADE_LABELS = { 0: "ひらがな", 1: "1ねんせい", 2: "2ねんせい", 3: "3ねんせい", 4: "4ねんせい", 5: "5ねんせい", 6: "6ねんせい", 99: "かんじ全部" };
        const UI_TEXTS = {
            "記録": "きろく", "設定": "せってい", "学びの足跡": "まなびのあしあと", "全部けす": "ぜんぶけす", "全部消す": "ぜんぶけす",
            "話す": "はなす", "決定": "けってい", "やめる": "やめる", "1字消す": "1じけす", "保存しました！": "ほぞんしました！",
            "どの きょうか？": "どの きょうか？", "しゃしん": "しゃしん", "とじる": "とじる", "やめる": "やめる",
            "今日のめあて": "きょうのめあて", "できたこと、うまくいったこと": "できたこと、うまくいったこと", "むずかしかったこと、うまくいかなかったこと": "むずかしかったこと、うまくいかなかったこと", "つぎのこと": "つぎのこと",
            "ぜんぶ ほぞんする 💎": "ぜんぶ ほぞんする 💎", "なおして ほぞんする 💎": "なおして ほぞんする 💎",
            "なおす": "なおす", "きろくをみる": "きろくをみる", "もうすぐだよ！": "もうすぐだよ！", "記録から消す": "きろくからけす", "ログイン": "ログイン"
        };

        let appState = { activeId: "", tiles: { t1: [], t2: [], t3: [], t4: [], photos: [] }, badges: { t1: "", t2: "", t3: "", t4: "" }, editingId: null, user: null, isDeleteMode: false, gradeMode: 1 };
        const ALL_SUBJECTS = ["国語", "算数", "生活", "理科", "社会", "音楽", "図工", "体育", "道徳", "外国語"];
        const EMOJI_LIST = ["🌸", "⭐", "🦖", "🚀", "🦄", "👑", "💎", "🎈", "🦁", "🐬", "🍭", "🎨", "⚽", "🌈", "✨", "🐱", "🐶", "🐰", "🐼", "🐯"];

        window.onload = function() { 
            checkAuth(); refreshMainView(); 
            // キーボード（VisualViewport）対応の監視
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', adjustForKeyboard);
                window.visualViewport.addEventListener('scroll', adjustForKeyboard);
            }
        };

        // キーボード出現時にエディタの高さを調節する
        function adjustForKeyboard() {
            const editor = document.getElementById('editorOverlay');
            if (editor.classList.contains('active')) {
                const vv = window.visualViewport;
                editor.style.height = `${vv.height}px`;
                // iPadのキーボードが出ている際、スクロール位置を調整
                window.scrollTo(0, 0);
            }
        }

        function isKanji(ch) { return (ch >= '\u4e00' && ch <= '\u9faf'); }
        function getAllowedKanji(lv) { if (lv === 0) return ""; if (lv === 99) return "ALL"; let list = ""; for (let i = 1; i <= lv; i++) list += KANJI_LISTS[i] || ""; return list; }

        function convertUI(text, lv) {
            if (lv === 99) return text;
            let result = text;
            const allowed = getAllowedKanji(lv);
            for (let [kanji, hira] of Object.entries(UI_TEXTS)) {
                if (result.includes(kanji)) {
                    let canKeep = true;
                    if (allowed === "") canKeep = false;
                    else { for (let char of kanji) { if (isKanji(char) && !allowed.includes(char)) canKeep = false; } }
                    if (!canKeep) result = result.split(kanji).join(hira);
                }
            }
            return result;
        }

        function convertWord(word, lv) {
            if (!word) return "";
            if (lv === 99) return word.surface;
            if (lv === 0) return word.furigana || word.surface;
            const allowed = getAllowedKanji(lv);
            for (let char of word.surface) { if (isKanji(char) && !allowed.includes(char)) return word.furigana || word.surface; }
            return word.surface;
        }

        function updateLabels() {
            const lv = appState.gradeMode;
            document.querySelectorAll('[data-label]').forEach(el => { el.innerText = convertUI(el.getAttribute('data-label'), lv); });
            document.getElementById('appTitle').innerText = convertUI("学びの足跡", lv);
            document.getElementById('historyBtnLabel').innerText = convertUI("記録をみる", lv);
            document.getElementById('loadingText').innerText = convertUI("もうすぐだよ！", lv);
            document.getElementById('currentModeTag').innerText = convertUI(GRADE_LABELS[lv], lv);
            let saveLabelKey = appState.editingId ? "なおして ほぞんする 💎" : "ぜんぶ ほぞんする 💎";
            if (appState.isDeleteMode) saveLabelKey = "記録から消す";
            document.getElementById('saveBtnLabel').innerText = convertUI(saveLabelKey, lv);
        }

        function checkAuth() {
            var auth = localStorage.getItem(AUTH_KEY);
            if (!auth) { document.getElementById('authOverlay').classList.add('active'); document.getElementById('registrationForm').style.display = "block"; }
            else { appState.user = JSON.parse(auth); document.getElementById('authOverlay').classList.add('active'); document.getElementById('loginForm').style.display = "block"; document.getElementById('loginMsg').innerText = appState.user.class + " " + appState.user.no + "番の パスワードを いれてね"; }
        }
        function login() { if (document.getElementById('loginPass').value === appState.user.pass) document.getElementById('authOverlay').classList.remove('active'); else alert("パスワードが ちがうよ！"); }
        function register() { var c = document.getElementById('regClass').value; var n = document.getElementById('regNo').value; var p = document.getElementById('regPass').value; if(!c || !n || !p) return alert("ぜんぶ いれてね！"); appState.user = { class: c, no: n, pass: p }; localStorage.setItem(AUTH_KEY, JSON.stringify(appState.user)); document.getElementById('authOverlay').classList.remove('active'); refreshMainView(); }
        
        function changeGrade(val) { 
            appState.gradeMode = parseInt(val); refreshMainView(); 
            if(document.getElementById('historyListModal').classList.contains('active')) renderHistoryList(window.currentHistorySubject); 
        }

        var SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        var rec = SpeechRecognition ? new SpeechRecognition() : null;
        var isRec = false;
        var lastInterim = "";

        if(rec) {
            rec.lang = 'ja-JP'; rec.interimResults = true; rec.continuous = true;
            rec.onstart = function() { isRec = true; lastInterim = ""; document.getElementById('micBtn').classList.add('mic-recording'); document.getElementById('micLabel').innerText = convertUI("やめる", appState.gradeMode); };
            rec.onend = function() { isRec = false; document.getElementById('micBtn').classList.remove('mic-recording'); document.getElementById('micLabel').innerText = convertUI("話す", appState.gradeMode); if(lastInterim.trim() !== "") sendToGas(lastInterim); lastInterim = ""; };
            rec.onresult = function(e) { let interim = ""; for(var i=e.resultIndex; i<e.results.length; i++) { if(e.results[i].isFinal) sendToGas(e.results[i][0].transcript); else interim += e.results[i][0].transcript; } lastInterim = interim; };
        }

        async function sendToGas(text) {
            if(!text.trim()) return;
            document.getElementById('loadingStatus').style.display = "flex";
            try {
                var res = await fetch(GAS_URL + '?text=' + encodeURIComponent(text));
                var d = await res.json();
                if(d.words_all) {
                    const combinedText = d.words_all.map(w => convertWord(w, appState.gradeMode)).join('');
                    document.getElementById('richDisplay').focus();
                    document.execCommand('insertText', false, combinedText);
                    syncEditorToState();
                }
            } catch(e){} finally { document.getElementById('loadingStatus').style.display = "none"; }
        }

        function handleMicAction() { if(!rec) return alert("マイク不可"); syncEditorToState(); try { if (isRec) rec.stop(); else rec.start(); } catch(e) { rec.stop(); } }

        function refreshMainView() {
            updateLabels();
            ['t1','t2','t3','t4'].forEach(id => {
                const words = appState.tiles[id] || [];
                document.getElementById('p-'+id).innerText = words.map(w => convertWord(w, appState.gradeMode)).join('');
                const b = document.getElementById('badge-'+id);
                if(appState.badges[id] && words.length > 0) { b.innerText = appState.badges[id]; b.style.display = "block"; } else b.style.display = "none";
            });
            document.getElementById('photoGrid').innerHTML = (appState.tiles.photos||[]).map((src,idx) => `<div class="photo-container"><img src="${src}" class="photo-img-main" onclick="viewPhoto('${src}')"><button class="delete-btn" onclick="event.stopPropagation(); deletePhoto(${idx})">✖</button></div>`).join('');
            document.getElementById('photoLabelInner').innerText = (appState.tiles.photos||[]).length + " / 2枚";
        }

        function syncEditorToState() {
            const plainText = document.getElementById('richDisplay').innerText;
            appState.tiles[appState.activeId] = plainText.trim() === "" ? [] : [{surface: plainText, furigana: plainText}];
            if(plainText.trim() !== "") { appState.isDeleteMode = false; document.getElementById('saveBtnContainer').style.backgroundColor = appState.editingId ? "#38bdf8" : "#fb923c"; }
        }

        function openEditor(id) {
            appState.activeId = id;
            document.getElementById('mainContainer').style.opacity = "0";
            const editor = document.getElementById('editorOverlay');
            editor.classList.add('active');
            adjustForKeyboard(); // 初期表示時の高さ調整
            const titles = {t1:'今日のめあて', t2:'できたこと、うまくいったこと', t3:'むずかしかったこと、うまくいかなかったこと', t4:'つぎのこと'};
            document.getElementById('editorTitle').innerText = convertUI(titles[id], appState.gradeMode);
            document.getElementById('richDisplay').innerText = (appState.tiles[id] || []).map(w => convertWord(w, appState.gradeMode)).join('');
            setTimeout(() => document.getElementById('richDisplay').focus(), 100);
        }

        function closeEditor(save) {
            if(save) syncEditorToState();
            document.getElementById('editorOverlay').classList.remove('active');
            document.getElementById('mainContainer').style.opacity = "1";
            if(save && appState.tiles[appState.activeId].length > 0 && !appState.badges[appState.activeId]) { appState.badges[appState.activeId] = EMOJI_LIST[Math.floor(Math.random() * EMOJI_LIST.length)]; }
            refreshMainView();
        }

        function startSaveProcess() {
            if (appState.isDeleteMode) { if(confirm("消しますか？")) executeDeletion(); return; }
            let hasContent = (appState.tiles.photos && appState.tiles.photos.length > 0);
            ['t1','t2','t3','t4'].forEach(k => { if(appState.tiles[k] && appState.tiles[k].length > 0) hasContent = true; });
            if (!hasContent) return alert("まだなにもありません");
            if (appState.editingId) executeFinalSave(null); else openModal('subjectModal');
        }

        function executeFinalSave(subject) {
            closeModal('subjectModal');
            playSaveSfx();
            const main = document.getElementById('mainContainer');
            main.classList.add('suck-in');
            setTimeout(() => {
                const h = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                if(appState.editingId) { 
                    const idx = h.findIndex(x => x.id === appState.editingId); 
                    if(idx !== -1) { h[idx].fullData = JSON.parse(JSON.stringify(appState.tiles)); h[idx].badges = JSON.parse(JSON.stringify(appState.badges)); }
                } else {
                    const entry = { id: Date.now(), date: new Date().toLocaleString('ja-JP'), subject: subject || "国語", fullData: JSON.parse(JSON.stringify(appState.tiles)), badges: JSON.parse(JSON.stringify(appState.badges)), user: appState.user };
                    h.unshift(entry);
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(h.slice(0, 50)));
                resetAll(true);
                main.classList.remove('suck-in');
            }, 650);
        }

        function executeDeletion() { const h = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); const newH = h.filter(x => x.id !== appState.editingId); localStorage.setItem(STORAGE_KEY, JSON.stringify(newH)); alert("消しました！"); resetAll(true); }

        function resetAll(silent) {
            appState.tiles = { t1: [], t2: [], t3: [], t4: [], photos: [] };
            appState.badges = { t1: "", t2: "", t3: "", t4: "" };
            if (!silent && appState.editingId) { appState.isDeleteMode = true; document.getElementById('saveBtnContainer').style.backgroundColor = "#ef4444"; } 
            else { appState.editingId = null; appState.isDeleteMode = false; document.getElementById('saveBtnContainer').style.backgroundColor = "#fb923c"; }
            refreshMainView();
        }

        function openModal(id) {
            const lv = appState.gradeMode;
            if(id === 'subjectModal') { const grid = document.getElementById('subjectGrid'); grid.innerHTML = ALL_SUBJECTS.map(s => `<button onclick="executeFinalSave('${s}')" class="subject-btn">${convertUI(s, lv)}</button>`).join(''); }
            if(id === 'settingsModal') { 
                const grid = document.getElementById('gradeGrid'); 
                const grades = [{v:0, t:"ひらがな"}, {v:1, t:"1年生"}, {v:2, t:"2年生"}, {v:3, t:"3年生"}, {v:4, t:"4年生"}, {v:5, t:"5年生"}, {v:6, t:"6年生"}, {v:99, t:"かんじ全部"}]; 
                grid.innerHTML = grades.map(g => { const activeClass = (appState.gradeMode === g.v) ? 'grade-btn-active' : ''; return `<button onclick="changeGrade(${g.v}); closeModal('settingsModal')" class="grade-btn ${activeClass}">${convertUI(g.t, lv)}</button>`; }).join(''); 
            }
            if(id === 'historySubjectModal') { const grid = document.getElementById('historySubGrid'); grid.innerHTML = ALL_SUBJECTS.map(s => `<button onclick="renderHistoryList('${s}')" class="subject-btn">${convertUI(s, lv)}</button>`).join(''); }
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function renderHistoryList(subject) {
            window.currentHistorySubject = subject;
            const lv = appState.gradeMode;
            const h = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]').filter(x => x.subject === subject);
            const list = document.getElementById('historyList');
            document.getElementById('historyTitleSmall').innerText = convertUI(subject, lv) + "の きろく";
            list.innerHTML = h.length ? "" : "<p class='text-center mt-10 text-gray-400'>きろくがありません</p>";
            h.forEach(item => {
                const div = document.createElement('div');
                div.className = "history-card";
                const data = item.fullData;
                const badges = item.badges || {};
                const createMiniTile = (title, key, isFull, borderCls) => `<div class="mini-tile ${isFull?'mini-tile-full':''} ${borderCls}"><div class="text-[10px] text-orange-400 font-bold">${convertUI(title, lv)}</div><div class="text-[11px] font-black text-gray-700 mt-1">${(data[key]||[]).map(w=>convertWord(w, lv)).join('')}</div><div class="mini-badge">${badges[key]||''}</div></div>`;
                div.innerHTML = `<div class="flex justify-between items-center mb-2 px-2"><span class="bg-orange-400 text-white px-3 py-1 rounded-full text-[10px] font-bold">${convertUI(item.subject, lv)}</span><span class="text-[9px] text-gray-400 font-bold">${item.date}</span></div><div class="mini-tiles-grid">${createMiniTile('今日のめあて', 't1', true, 'border-blue')}${createMiniTile('できたこと', 't2', false, 'border-orange')}${createMiniTile('むずかしかった', 't3', false, 'border-orange')}${createMiniTile('つぎのこと', 't4', true, 'border-green')}</div><div class="mt-3 bg-white border-2 border-orange-100 rounded-xl p-1 flex gap-2 overflow-x-auto">${(data.photos||[]).map(src => `<img src="${src}" class="h-12 w-12 object-cover rounded-lg" onclick="viewPhoto('${src}')">`).join('')}</div><button onclick="loadToApp(${item.id});" class="w-full mt-4 bg-orange-400 text-white py-3 rounded-2xl font-black text-sm shadow-md active:scale-95 transition-all">✎ ${convertUI('なおす', lv)}</button>`;
                list.appendChild(div);
            });
            closeModal('historySubjectModal'); openModal('historyListModal');
        }

        function loadToApp(id) {
            const h = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const item = h.find(x => x.id === id);
            if(item) { 
                appState.tiles = JSON.parse(JSON.stringify(item.fullData)); 
                appState.badges = JSON.parse(JSON.stringify(item.badges || {})); 
                appState.editingId = id; 
                appState.isDeleteMode = false; 
                document.getElementById('saveBtnContainer').style.backgroundColor = "#38bdf8"; 
                refreshMainView(); 
                closeModal('historyListModal');
            }
        }

        async function handlePhotos(input) {
            const fs = Array.from(input.files);
            if((appState.tiles.photos||[]).length + fs.length > 2) return alert("写真は2枚までです");
            for(let f of fs) { const src = await new Promise(r => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(f); }); if(!appState.tiles.photos) appState.tiles.photos = []; appState.tiles.photos.push(src); }
            refreshMainView(); input.value = "";
        }
        function deletePhoto(i) { if(confirm("消しますか？")) { appState.tiles.photos.splice(i,1); refreshMainView(); } }
        function viewPhoto(src) { document.getElementById('fullPhoto').src = src; document.getElementById('photoViewerOverlay').classList.add('active'); }
    </script>
</head>
<body class="select-none">

    <div id="authOverlay">
        <div id="registrationForm" class="auth-card" style="display:none;">
            <h2 class="text-3xl font-black text-orange-500 mb-6 italic">はじめまして！</h2>
            <input type="text" id="regClass" placeholder="なに組？">
            <input type="number" id="regNo" placeholder="出席ばんごう">
            <input type="password" id="regPass" placeholder="パスワード">
            <button onclick="register()" class="w-full bg-orange-500 text-white py-6 rounded-2xl font-black text-2xl shadow-xl mt-4">はじめる！</button>
        </div>
        <div id="loginForm" class="auth-card" style="display:none;">
            <h2 class="text-3xl font-black text-orange-500 mb-6 italic">おかえり！</h2>
            <p id="loginMsg" class="text-gray-500 font-bold mb-4 text-sm"></p>
            <input type="password" id="loginPass" placeholder="パスワード">
            <button onclick="login()" data-label="ログイン" class="w-full bg-orange-500 text-white py-6 rounded-2xl font-black text-2xl shadow-xl mt-4"></button>
        </div>
    </div>

    <div id="mainContainer" class="main-container">
        <div id="headerArea" class="pt-4 flex justify-between items-center shrink-0 transition-opacity">
            <button onclick="openModal('historySubjectModal')" class="bg-white border-2 border-orange-200 rounded-full px-4 py-2 shadow-sm active:scale-95 transition-all">
                <span id="historyBtnLabel" class="text-xs font-black text-orange-400 italic">記録をみる</span>
            </button>
            <h1 id="appTitle" class="text-xl font-black text-orange-400 tracking-tighter text-center flex-1">学びの足跡</h1>
            <div class="flex items-center gap-2">
                <span id="currentModeTag" class="text-[10px] font-black bg-orange-100 text-orange-500 px-3 py-1 rounded-full border border-orange-200"></span>
                <button onclick="openModal('settingsModal')" class="bg-orange-100 border border-orange-200 rounded-full w-10 h-10 flex items-center justify-center text-xl shadow-sm active:scale-95 transition-all">⚙️</button>
            </div>
        </div>

        <div id="mainContentArea" class="flex-1 flex flex-col gap-3 min-height-0 transition-opacity">
            <div class="tiles-grid">
                <button class="tile-btn col-span-2 border-blue" onclick="openEditor('t1')">
                    <div data-label="今日のめあて" class="tile-label text-sky-400"></div>
                    <div id="p-t1" class="tile-preview"></div>
                    <div id="badge-t1" class="badge" style="display:none;"></div>
                </button>
                <button class="tile-btn border-orange" onclick="openEditor('t2')">
                    <div data-label="できたこと、うまくいったこと" class="tile-label text-orange-400"></div>
                    <div id="p-t2" class="tile-preview"></div>
                    <div id="badge-t2" class="badge" style="display:none;"></div>
                </button>
                <button class="tile-btn border-orange" onclick="openEditor('t3')">
                    <div data-label="むずかしかったこと、うまくいかなかったこと" class="tile-label text-orange-400"></div>
                    <div id="p-t3" class="tile-preview"></div>
                    <div id="badge-t3" class="badge" style="display:none;"></div>
                </button>
                <button class="tile-btn col-span-2 border-green" onclick="openEditor('t4')">
                    <div data-label="つぎのこと" class="tile-label text-lime-500"></div>
                    <div id="p-t4" class="tile-preview"></div>
                    <div id="badge-t4" class="badge" style="display:none;"></div>
                </button>
                <button class="tile-btn col-span-2 border-orange" onclick="document.getElementById('fileInput').click()" style="min-height: 80px; max-height: 120px;">
                    <div data-label="しゃしん" class="tile-label text-orange-400"></div>
                    <div id="photoLabelInner" class="absolute top-4 right-4 text-[10px] text-orange-300">0 / 2枚</div>
                    <div id="photoGrid" class="photo-grid-mini"></div>
                    <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" onchange="handlePhotos(this)">
                </button>
            </div>
            <div class="footer-buttons">
                <button onclick="resetAll()" data-label="全部消す" class="flex-1 bg-red-400 text-white rounded-[2rem] py-5 font-black text-2xl shadow-xl border-b-8 border-red-600 active:scale-95 transition-all"></button>
                <button id="saveBtnContainer" onclick="startSaveProcess()" class="flex-[2] bg-orange-400 text-white rounded-[2rem] py-5 font-black text-2xl shadow-xl border-b-8 border-orange-600 active:scale-95 transition-all"><span id="saveBtnLabel"></span></button>
            </div>
        </div>
    </div>

    <div id="editorOverlay">
        <div class="flex justify-between items-center mb-4 px-2 relative shrink-0">
            <button onclick="closeEditor(false)" data-label="やめる" class="text-gray-400 font-black text-2xl p-2 active:scale-90 transition-all"></button>
            <div id="editorTitle" class="absolute left-1/2 -translate-x-1/2 text-orange-400 font-black text-xl italic text-center w-3/4"></div>
            <div class="w-20"></div> 
        </div>
        <div class="flex-1 relative flex flex-col min-h-0">
            <div id="loadingStatus" style="display:none;" class="absolute inset-0 bg-white/80 z-[6000] flex flex-col items-center justify-center rounded-[2.5rem]"><div id="loadingText" class="text-3xl font-black text-orange-400 animate-bounce"></div></div>
            <div id="richDisplay" contenteditable="true" spellcheck="false" oninput="syncEditorToState()"></div>
        </div>
        <div class="editor-bottom-nav">
            <button onclick="document.getElementById('richDisplay').innerText = ''; syncEditorToState();" data-label="全部消す" class="bg-zinc-200 rounded-[1.5rem] py-3 text-zinc-500 font-black text-xs btn-active-state"></button>
            <button onclick="document.execCommand('delete', false, null); syncEditorToState();" data-label="1字消す" class="bg-blue-100 rounded-[1.5rem] py-3 text-blue-500 font-black text-xs btn-active-state"></button>
            <button id="micBtn" onclick="handleMicAction()" class="bg-sky-500 rounded-[2rem] py-8 text-white font-black text-4xl shadow-lg border-b-8 border-sky-700 btn-active-state">
                <span id="micLabel" data-label="話す"></span>
            </button>
            <button onclick="closeEditor(true)" data-label="決定" class="bg-orange-500 rounded-[2rem] py-6 text-white font-black text-2xl shadow-md border-b-4 border-orange-700 btn-active-state"></button>
        </div>
    </div>

    <div id="historyListModal" class="modal-bg" onclick="if(event.target===this) closeModal('historyListModal')">
        <div class="modal-content-wide">
            <div class="flex justify-between items-center mb-2 px-6 shrink-0 pt-4">
                <div id="historyTitleSmall" class="text-xl font-black text-orange-400 italic"></div>
                <div></div>
            </div>
            <div id="historyList" class="flex-1 overflow-y-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-6 pb-24"></div>
            <div class="absolute bottom-6 right-8">
                <button onclick="closeModal('historyListModal')" data-label="とじる" class="bg-gray-100 text-gray-400 px-12 py-4 rounded-full font-black text-2xl shadow-md transition-all active:scale-95 italic"></button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal-bg" onclick="if(event.target===this) closeModal('settingsModal')">
        <div class="modal-content text-center shadow-2xl"><h2 data-label="どの 学年？" class="text-2xl font-black text-orange-400 mb-6 italic"></h2><div id="gradeGrid" class="grade-grid"></div><button onclick="closeModal('settingsModal')" data-label="とじる" class="text-gray-400 font-bold"></button></div>
    </div>

    <div id="subjectModal" class="modal-bg" onclick="if(event.target===this) closeModal('subjectModal')">
        <div class="modal-content text-center shadow-2xl"><h2 data-label="どの きょうか？" class="text-2xl font-black text-orange-400 mb-6 italic"></h2><div id="subjectGrid" class="subject-grid"></div><button onclick="closeModal('subjectModal')" data-label="やめる" class="text-gray-400 font-bold">やめる</button></div>
    </div>

    <div id="historySubjectModal" class="modal-bg" onclick="if(event.target===this) closeModal('historySubjectModal')">
        <div class="modal-content text-center shadow-2xl"><h2 data-label="どの きょうか？" class="text-2xl font-black text-orange-400 mb-6 italic"></h2><div id="historySubGrid" class="subject-grid"></div><button onclick="closeModal('historySubjectModal')" data-label="やめる" class="text-gray-400 font-bold">やめる</button></div>
    </div>

    <div id="photoViewerOverlay" class="modal-bg" onclick="this.classList.remove('active')" style="background-color:rgba(0,0,0,0.95);"><img id="fullPhoto" class="max-w-[95%] max-h-[85%] object-contain rounded-2xl border-4 border-white shadow-2xl"><p class="text-white font-black mt-6 text-xl animate-bounce italic">タップして とじる</p></div>

</body>
</html>
