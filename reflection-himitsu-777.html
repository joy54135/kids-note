<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ふりかえり たからばこ v4.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .sketchbook { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
        .modal-bg { background-color: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        
        .tile { background: white; border: 4px solid #ffedd5; border-radius: 2rem; padding: 1.5rem; display: flex; flex-direction: column; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
        .tile:active { transform: scale(0.95); background: #fff7ed; }
        .tile-label { color: #fb923c; font-weight: 900; font-size: 0.9rem; margin-bottom: 0.5rem; pointer-events: none; }
        .tile-preview { flex: 1; font-weight: 900; color: #4b5563; line-height: 1.2; overflow: hidden; pointer-events: none; word-break: break-all; }

        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; height: 100%; width: 100%; pointer-events: none; }
        .photo-item { width: 100%; height: 100%; object-fit: cover; border-radius: 1rem; background: #f3f4f6; }

        #editorOverlay { position: fixed; inset: 0; background: #fffbeb; z-index: 500; display: none; flex-direction: column; padding: 1.5rem; }
        #richDisplay { caret-color: #38bdf8; outline: none; min-height: 100%; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body class="bg-amber-50 p-3 select-none">

    <div class="w-full max-w-3xl mx-auto flex justify-between items-center mb-4 shrink-0 relative z-10">
        <button id="historyBtn" class="bg-white border-2 border-orange-200 rounded-full px-5 py-2 shadow-sm active:scale-90 flex items-center gap-1" onclick="alert('まだ準備中だよ！')">
            <span class="text-2xl">🎁</span> <span class="text-sm font-black text-orange-400 italic">きろく</span>
        </button>
        <h1 class="text-xl font-black text-orange-400 tracking-tighter text-center flex-1">ふりかえり たからばこ</h1>
        <select id="gradeMode" class="bg-orange-400 text-white font-black text-xs px-4 py-2 rounded-full border-2 border-white shadow-sm outline-none" onchange="renderTilePreviews()">
            <option value="0">ひらがな</option><option value="1" selected>1ねんせい</option><option value="2">2ねんせい</option><option value="99">ぜんぶ</option>
        </select>
    </div>

    <div id="mainGrid" class="flex-1 w-full max-w-3xl mx-auto grid grid-cols-2 grid-rows-[1fr_1fr_0.8fr] gap-4 mb-4">
        <div class="tile" onclick="openEditor('t1')"><div class="tile-label">めあて</div><div id="p-t1" class="tile-preview text-2xl"></div></div>
        <div class="tile" onclick="openEditor('t2')"><div class="tile-label">できたこと</div><div id="p-t2" class="tile-preview text-2xl"></div></div>
        <div class="tile" onclick="openEditor('t3')"><div class="tile-label">むずかしかったこと</div><div id="p-t3" class="tile-preview text-2xl"></div></div>
        <div class="tile" onclick="openEditor('t4')"><div class="tile-label">つぎのこと</div><div id="p-t4" class="tile-preview text-2xl"></div></div>
        <div class="tile col-span-2" onclick="triggerPhotoInput()"><div class="tile-label">しゃしん</div><div id="p-t5" class="photo-grid"></div><input type="file" id="fileInput" accept="image/*" multiple class="hidden"></div>
    </div>

    <div class="w-full max-w-3xl mx-auto flex gap-4"><button id="finalSaveBtn" class="flex-1 bg-orange-400 border-4 border-orange-100 rounded-2xl py-4 shadow-lg active:scale-95 text-white font-black text-xl" onclick="showConfirm()">ほぞんする 💰</button></div>

    <div id="editorOverlay" class="sketchbook">
        <div class="flex justify-between items-center mb-4"><button onclick="closeEditor(false)" class="text-gray-400 font-black text-lg">✖ やめる</button><div id="editorTitle" class="text-orange-400 font-black text-xl tracking-tighter">編集</div><button onclick="closeEditor(true)" class="bg-orange-400 text-white px-8 py-2 rounded-full font-black shadow-md">決定 ✅</button></div>
        <div id="canvas" class="flex-1 bg-white rounded-[2.5rem] shadow-inner border-4 border-orange-100 p-6 mb-4 flex flex-col relative min-h-0">
            <div id="outputContainer" class="flex-1 overflow-y-auto min-h-0"><div id="richDisplay" contenteditable="true" class="text-5xl font-black text-gray-700 leading-tight w-full"></div></div>
            <div id="kanjiDisplay" class="shrink-0 w-full text-lg font-bold text-gray-300 border-t border-gray-100 pt-2 italic opacity-60"></div>
        </div>
        <div class="grid grid-cols-3 gap-4 mb-4">
            <button id="micBtn" onclick="toggleMic()" class="relative bg-sky-400 border-4 border-sky-100 rounded-2xl py-6 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white"><span id="micLabel" class="text-2xl font-black italic">おしてね</span></button>
            <button id="listenBtn" onclick="playCurrentText()" class="bg-green-400 border-4 border-green-100 rounded-2xl py-6 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white"><span class="text-4xl">📢</span></button>
            <button id="backspaceBtn" onclick="doBackspace()" class="bg-white border-4 border-orange-100 rounded-2xl py-6 shadow-lg active:scale-95 flex flex-col items-center justify-center text-orange-400"><span class="text-4xl">⌫</span></button>
        </div>
    </div>

    <div id="confirmModal" class="hidden modal-bg" style="display: none;">
        <div class="bg-white rounded-[2rem] p-10 w-full max-w-sm shadow-2xl text-center border-8 border-orange-50">
            <p class="text-2xl font-black text-gray-700 mb-8 tracking-tighter">たからばこに ほぞんする？</p>
            <div class="flex gap-4"><button onclick="hideConfirm()" class="flex-1 bg-gray-100 py-4 rounded-2xl font-black text-gray-400">いいえ</button><button onclick="executeSave()" class="flex-1 bg-orange-500 py-4 rounded-2xl font-black text-white shadow-lg">はい！</button></div>
        </div>
    </div>

    <script>
        // 1. 全ての関数を最初に定義する
        const QUESTIONS = {t1:'めあて', t2:'できたこと', t3:'むずかしかったこと', t4:'つぎのこと'};
        const KANJI_LISTS = { 1: "一右雨円王音下火花貝学気九休玉金空月犬見五口校左三山子四糸字耳七車手十出女小上森人水正生青夕石赤千川先早草足村大男竹中虫町天田土二日入年白八百文木本名目立力林六", 2: "引羽雲園遠何科夏家歌画回会海絵外角楽活間丸岩顔汽記帰弓牛魚京強教近兄形計元言原戸古午後語工公広交光考行高黄合谷国黒今才細作算止市矢姉思紙寺自時室社弱首秋週春書少場色食心新親図数西声星晴切雪船線前組走多太体台地池知茶昼長鳥朝直通弟店点電刀冬當東答頭同道読内南肉馬売買麦半番父風分聞米歩母方北毎妹万明鳴毛門夜野友用曜来里理話" };
        
        let appState = { activeTileId: null, tiles: { t1:{conversation:[], kanjiText:""}, t2:{conversation:[], kanjiText:""}, t3:{conversation:[], kanjiText:""}, t4:{conversation:[], kanjiText:""}, t5:{images:[]} } };
        let currentConversation = [];
        let currentKanjiText = "";
        let audioCtx = null;
        let isRunning = false;

        function renderTilePreviews() {
            const lv = parseInt(document.getElementById('gradeMode').value);
            const allowed = (l) => { let s=""; for(let i=1;i<=l;i++) s+=KANJI_LISTS[i]||""; return s; }(lv);
            Object.keys(QUESTIONS).forEach(id => {
                let txt = ""; appState.tiles[id].conversation.forEach(w => {
                    const f = w.furigana || w.surface;
                    if(lv===0) txt += f; else if(lv===99) txt += w.surface;
                    else { let can = true; for(let c of w.surface){ if(c >= '\u4e00' && c <= '\u9faf' && !allowed.includes(c)) can = false; } txt += can ? w.surface : f; }
                });
                const el = document.getElementById('p-'+id);
                if(el) el.innerText = txt;
            });
            renderPhotoGrid();
        }

        function openEditor(id) {
            try { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioCtx.resume(); } catch(e) {}
            appState.activeTileId = id;
            const data = appState.tiles[id];
            document.getElementById('editorTitle').innerText = QUESTIONS[id];
            document.getElementById('editorOverlay').style.display = 'flex';
            currentConversation = [...data.conversation];
            currentKanjiText = data.kanjiText;
            renderEditorDisplay();
        }

        function closeEditor(save) {
            if(save) {
                appState.tiles[appState.activeTileId].conversation = [...currentConversation];
                appState.tiles[appState.activeTileId].kanjiText = currentKanjiText;
            }
            document.getElementById('editorOverlay').style.display = 'none';
            appState.activeTileId = null;
            renderTilePreviews();
        }

        function renderEditorDisplay() {
            const lv = parseInt(document.getElementById('gradeMode').value);
            const allowed = (l) => { let s=""; for(let i=1;i<=l;i++) s+=KANJI_LISTS[i]||""; return s; }(lv);
            let html = ""; currentConversation.forEach(w => {
                const f = w.furigana || w.surface;
                if(lv===0) html += f; else if(lv===99) html += w.surface;
                else { let can = true; for(let c of w.surface){ if(c >= '\u4e00' && c <= '\u9faf' && !allowed.includes(c)) can = false; } html += can ? w.surface : f; }
            });
            document.getElementById('richDisplay').innerHTML = html;
            document.getElementById('kanjiDisplay').innerText = currentKanjiText;
        }

        // 音声認識
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = SpeechRecognition ? new SpeechRecognition() : null;
        if(rec) {
            rec.lang = 'ja-JP'; rec.interimResults = true;
            rec.onstart = () => { isRunning = true; document.getElementById('micBtn').classList.add('bg-red-500', 'pulse-red'); document.getElementById('micLabel').innerText = "きいてるよ"; };
            rec.onend = () => { isRunning = false; document.getElementById('micBtn').classList.remove('bg-red-500', 'pulse-red'); document.getElementById('micLabel').innerText = "おしてね"; };
            rec.onresult = (e) => {
                let final = ''; for (let i = e.resultIndex; i < e.results.length; i++) if (e.results[i].isFinal) final += e.results[i][0].transcript;
                if (final) sendToGas(final);
            };
        }

        function toggleMic() { if(!rec) return; isRunning ? rec.stop() : rec.start(); }
        async function sendToGas(text) {
            try {
                const res = await fetch(`https://script.google.com/macros/s/AKfycbxxE14tNshFIqZHwzhyGQtRDeSazD9aPex9Tm0gIGJjmUvd8jAiFN-bkQyNIt_D9cV_/exec?text=${encodeURIComponent(text)}`);
                const d = await res.json();
                if(d.words_all) { currentConversation.push(...d.words_all); currentKanjiText = currentConversation.map(w=>w.surface).join(''); renderEditorDisplay(); }
            } catch(e) {}
        }

        function doBackspace() { currentConversation.pop(); currentKanjiText = currentConversation.map(w=>w.surface).join(''); renderEditorDisplay(); }
        function playCurrentText() { const u = new SpeechSynthesisUtterance(currentKanjiText || "なにかお話ししてね"); u.lang='ja-JP'; window.speechSynthesis.speak(u); }

        // 写真
        function triggerPhotoInput() { document.getElementById('fileInput').click(); }
        document.getElementById('fileInput').onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                if(appState.tiles.t5.images.length >= 4) return;
                const r = new FileReader();
                r.onload = (ev) => {
                    const i = new Image();
                    i.onload = () => {
                        const c = document.createElement('canvas'); const m = 600;
                        let w = i.width, h = i.height;
                        if(w>h) { if(w>m){ h*=m/w; w=m; } } else { if(h>m){ w*=m/h; h=m; } }
                        c.width = w; c.height = h; c.getContext('2d').drawImage(i,0,0,w,h);
                        appState.tiles.t5.images.push(c.toDataURL('image/jpeg', 0.6)); renderPhotoGrid();
                    };
                    i.src = ev.target.result;
                };
                r.readAsDataURL(file);
            });
        };
        function renderPhotoGrid() { document.getElementById('p-t5').innerHTML = appState.tiles.t5.images.map(s => `<img src="${s}" class="photo-item">`).join(''); }

        // 保存モーダル
        function showConfirm() { document.getElementById('confirmModal').style.display = 'flex'; }
        function hideConfirm() { document.getElementById('confirmModal').style.display = 'none'; }
        function executeSave() { localStorage.clear(); location.reload(); }

        // 初期起動
        window.addEventListener('load', () => {
            renderTilePreviews();
            // 万が一の強制リセット
            document.getElementById('editorOverlay').style.display = 'none';
            document.getElementById('confirmModal').style.display = 'none';
        });
    </script>
</body>
</html>
