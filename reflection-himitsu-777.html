<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひらがな めがね Ver.18.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .word-card { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="bg-amber-50 h-screen flex flex-col items-center justify-between p-6 overflow-hidden">

    <h1 class="text-3xl font-black text-orange-400 mt-4 tracking-tighter text-center">ひらがな めがね</h1>

    <div id="display-container" class="flex-1 w-full flex flex-col items-center justify-center relative">
        <div id="display" class="flex flex-wrap justify-center gap-4 w-full content-center text-center">
            <p id="msg" class="text-2xl text-orange-300 font-bold px-4">ボタンを おしてね</p>
        </div>
        <div id="debug-area" class="absolute bottom-4 text-[10px] text-red-300 font-mono text-center w-full px-4 break-all"></div>
    </div>

    <div class="mb-12 relative flex flex-col items-center">
        <button id="micBtn" class="w-44 h-44 bg-sky-400 border-[12px] border-sky-100 rounded-full shadow-2xl flex items-center justify-center active:scale-95 transition-all">
            <span id="btnLabel" class="text-white text-3xl font-black italic">おしてね</span>
        </button>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbw4dWgEjFCI7hHDzJI-zyDP38Z__6ihh_AMQULr5GHFblJnB0u6XNL_cYcihbEpzCDg/exec'; // ★新しくデプロイしたURLを貼る

        const micBtn = document.getElementById('micBtn');
        const btnLabel = document.getElementById('btnLabel');
        const msg = document.getElementById('msg');
        const debugArea = document.getElementById('debug-area');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let isRunning = false;

        if (!SpeechRecognition) {
            msg.innerText = "Safariで ひらいてね";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;

            micBtn.onclick = () => {
                if (!isRunning) {
                    debugArea.innerText = "";
                    try { recognition.start(); } catch(e) {}
                } else {
                    recognition.stop();
                    btnLabel.innerText = "WAIT...";
                }
            };

            recognition.onstart = () => {
                isRunning = true;
                micBtn.classList.add('bg-red-500');
                btnLabel.innerText = "おわる";
                msg.innerText = "はなしてみてね！";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                msg.innerText = "「" + transcript + "」";
                if (event.results[0].isFinal) {
                    msg.innerText = "へんかん中...";
                    sendToGas(transcript);
                }
            };

            recognition.onend = () => {
                isRunning = false;
                micBtn.classList.remove('bg-red-500');
                btnLabel.innerText = "おしてね";
            };
        }

        async function sendToGas(text) {
            try {
                const res = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}`);
                const data = await res.json();
                if (data.words) {
                    renderWords(data.words);
                    msg.innerText = "";
                } else {
                    debugArea.innerText = `ERR: ${data.error}\n${data.debug || ''}`;
                }
            } catch (e) {
                debugArea.innerText = "つうしんエラー";
            }
        }

        function renderWords(words) {
            const display = document.getElementById('display');
            display.innerHTML = '';
            words.forEach((word, i) => {
                const card = document.createElement('div');
                card.className = 'word-card bg-white border-b-8 border-orange-100 rounded-3xl p-6 shadow-xl m-2';
                card.innerHTML = `<span class="text-6xl font-black text-gray-700 leading-none">${word}</span>`;
                card.style.animationDelay = `${i * 0.1}s`;
                display.appendChild(card);
            });
        }
    </script>
</body>
</html>
