<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ふりかえり たからばこ v4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background-color: #fffbeb; }
        .sketchbook { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        
        /* タイルを「button」として再設計 */
        .tile-btn { 
            background: white; border: 4px solid #ffedd5; border-radius: 2rem; padding: 1.5rem; 
            display: flex; flex-direction: column; text-align: left;
            transition: all 0.1s; width: 100%; height: 100%;
            -webkit-appearance: none; appearance: none;
        }
        .tile-btn:active { transform: scale(0.95); background: #fff7ed; border-color: #fb923c; }
        
        .tile-label { color: #fb923c; font-weight: 900; font-size: 0.9rem; margin-bottom: 0.5rem; pointer-events: none; }
        .tile-preview { flex: 1; font-weight: 900; color: #4b5563; line-height: 1.3; overflow: hidden; pointer-events: none; word-break: break-all; font-size: 1.25rem; }

        #editorOverlay { 
            position: fixed; inset: 0; background: #fffbeb; z-index: 999; 
            display: none; flex-direction: column; padding: 1.5rem;
        }
        
        .modal-bg { 
            background-color: rgba(0,0,0,0.8); backdrop-filter: blur(10px); 
            position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 1rem;
            z-index: 1000;
        }

        #richDisplay { caret-color: #38bdf8; outline: none; min-height: 100%; white-space: pre-wrap; word-break: break-all; }
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; height: 100%; width: 100%; pointer-events: none; }
        .photo-item { width: 100%; height: 100%; object-fit: cover; border-radius: 0.5rem; background: #f3f4f6; }
    </style>
</head>
<body class="p-3 select-none">

    <div class="w-full max-w-3xl mx-auto flex justify-between items-center mb-4 shrink-0 relative z-10">
        <button class="bg-white border-2 border-orange-200 rounded-full px-4 py-2 shadow-sm active:scale-90 flex items-center gap-1" onclick="alert('準備中！')">
            <span class="text-xl">🎁</span> <span class="text-xs font-black text-orange-400">きろく</span>
        </button>
        <h1 class="text-xl font-black text-orange-400 tracking-tighter text-center flex-1">ふりかえり たからばこ</h1>
        <select id="gradeMode" class="bg-orange-400 text-white font-black text-xs px-3 py-2 rounded-full border-2 border-white shadow-sm outline-none" onchange="refreshAll()">
            <option value="0">ひらがな</option><option value="1" selected>1ねんせい</option><option value="2">2ねんせい</option><option value="99">ぜんぶ</option>
        </select>
    </div>

    <div id="mainGrid" class="flex-1 w-full max-w-3xl mx-auto grid grid-cols-2 grid-rows-[1fr_1fr_0.8fr] gap-4 mb-4">
        <button class="tile-btn" onclick="openEditor('t1')"><div class="tile-label">めあて</div><div id="p-t1" class="tile-preview"></div></button>
        <button class="tile-btn" onclick="openEditor('t2')"><div class="tile-label">できたこと</div><div id="p-t2" class="tile-preview"></div></button>
        <button class="tile-btn" onclick="openEditor('t3')"><div class="tile-label">むずかしかった</div><div id="p-t3" class="tile-preview"></div></button>
        <button class="tile-btn" onclick="openEditor('t4')"><div class="tile-label">つぎのこと</div><div id="p-t4" class="tile-preview"></div></button>
        <button class="tile-btn col-span-2" onclick="triggerPhoto()"><div class="tile-label">しゃしん</div><div id="p-t5" class="photo-grid"></div><input type="file" id="fileInput" accept="image/*" multiple class="hidden"></button>
    </div>

    <div class="w-full max-w-3xl mx-auto"><button class="w-full bg-orange-400 border-4 border-orange-100 rounded-2xl py-4 shadow-lg active:scale-95 text-white font-black text-xl" onclick="openModal('confirmModal')">ほぞんする 💰</button></div>

    <div id="editorOverlay" class="sketchbook">
        <div class="flex justify-between items-center mb-4">
            <button onclick="closeEditor(false)" class="text-gray-400 font-black text-lg p-2">✖ やめる</button>
            <div id="editorTitle" class="text-orange-400 font-black text-xl">編集</div>
            <button onclick="closeEditor(true)" class="bg-orange-400 text-white px-8 py-2 rounded-full font-black shadow-md">決定 ✅</button>
        </div>
        <div class="flex-1 bg-white rounded-[2.5rem] shadow-inner border-4 border-orange-100 p-6 mb-4 flex flex-col relative min-h-0">
            <div class="flex-1 overflow-y-auto min-h-0"><div id="richDisplay" contenteditable="true" class="text-4xl font-black text-gray-700 leading-tight w-full"></div></div>
            <div id="kanjiDisplay" class="shrink-0 w-full text-lg font-bold text-gray-300 border-t border-gray-100 pt-2 italic opacity-60"></div>
        </div>
        <div class="grid grid-cols-3 gap-4 mb-4">
            <button id="micBtn" onclick="toggleSpeech()" class="bg-sky-400 border-4 border-sky-100 rounded-2xl py-6 shadow-lg active:scale-95 text-white"><span id="micLabel" class="text-2xl font-black">おしてね</span></button>
            <button onclick="playVoice()" class="bg-green-400 border-4 border-green-100 rounded-2xl py-6 shadow-lg active:scale-95 text-white"><span class="text-4xl">📢</span></button>
            <button onclick="deleteText()" class="bg-white border-4 border-orange-100 rounded-2xl py-6 shadow-lg active:scale-95 text-orange-400"><span class="text-4xl">⌫</span></button>
        </div>
    </div>

    <div id="confirmModal" class="modal-bg">
        <div class="bg-white rounded-[2rem] p-10 w-full max-w-sm shadow-2xl text-center border-8 border-orange-50">
            <p class="text-2xl font-black text-gray-700 mb-8">ほぞんする？</p>
            <div class="flex gap-4"><button onclick="closeModal('confirmModal')" class="flex-1 bg-gray-100 py-4 rounded-2xl font-black text-gray-400">いいえ</button><button onclick="location.reload()" class="flex-1 bg-orange-500 py-4 rounded-2xl font-black text-white shadow-lg">はい！</button></div>
        </div>
    </div>

    <script>
        // データと設定
        const KANJI_LISTS = { 1: "一右雨円王音下火花貝学気九休玉金空月犬見五口校左三山子四糸字耳七車手十出女小上森人水正生青夕石赤千川先早草足村大男竹中虫町天田土二日入年白八百文木本名目立力林六", 2: "引羽雲園遠何科夏家歌画回会海絵外角楽活間丸岩顔汽記帰弓牛魚京強教近兄形計元言原戸古午後語工公広交光考行高黄合谷国黒今才細作算止市矢姉思紙寺自時室社弱首秋週春書少場色食心新親図数西声星晴切雪船線前組走多太体台地池知茶昼長鳥朝直通弟店点電刀冬當東答頭同道読内南肉馬売買麦半番父風分聞米歩母方北毎妹万明鳴毛門夜野友用曜来里理話" };
        let appState = { activeId: null, tiles: { t1:[], t2:[], t3:[], t4:[], t5:[] } };
        let currentWords = [];
        let isRec = false;

        // 画面切り替え（最優先）
        function openEditor(id) {
            appState.activeId = id;
            document.getElementById('editorTitle').innerText = {t1:'めあて', t2:'できたこと', t3:'むずかしかった', t4:'つぎのこと'}[id];
            currentWords = [...appState.tiles[id]];
            renderEditor();
            document.getElementById('editorOverlay').style.display = 'flex';
        }

        function closeEditor(save) {
            if(save) appState.tiles[appState.activeId] = [...currentWords];
            document.getElementById('editorOverlay').style.display = 'none';
            refreshAll();
        }

        // 描画
        function refreshAll() {
            const lv = parseInt(document.getElementById('gradeMode').value);
            const allowed = (l) => { let s=""; for(let i=1;i<=l;i++) s+=KANJI_LISTS[i]||""; return s; }(lv);
            ['t1','t2','t3','t4'].forEach(id => {
                let txt = ""; appState.tiles[id].forEach(w => {
                    const f = w.furigana || w.surface;
                    if(lv===0) txt += f; else if(lv===99) txt += w.surface;
                    else { let can=true; for(let c of w.surface){ if(c >= '\u4e00' && c <= '\u9faf' && !allowed.includes(c)) can=false; } txt += can ? w.surface : f; }
                });
                document.getElementById('p-'+id).innerText = txt;
            });
        }

        function renderEditor() {
            const lv = parseInt(document.getElementById('gradeMode').value);
            const allowed = (l) => { let s=""; for(let i=1;i<=l;i++) s+=KANJI_LISTS[i]||""; return s; }(lv);
            let html = ""; let kanji = "";
            currentWords.forEach(w => {
                kanji += w.surface;
                const f = w.furigana || w.surface;
                if(lv===0) html += f; else if(lv===99) html += w.surface;
                else { let can=true; for(let c of w.surface){ if(c >= '\u4e00' && c <= '\u9faf' && !allowed.includes(c)) can=false; } html += can ? w.surface : f; }
            });
            document.getElementById('richDisplay').innerHTML = html;
            document.getElementById('kanjiDisplay').innerText = kanji;
        }

        // 音声認識（簡易版）
        const rec = (window.SpeechRecognition || window.webkitSpeechRecognition) ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
        if(rec) {
            rec.lang = 'ja-JP'; rec.interimResults = true;
            rec.onstart = () => { isRec = true; document.getElementById('micBtn').classList.add('bg-red-500', 'pulse-red'); document.getElementById('micLabel').innerText = "きいてるよ"; };
            rec.onend = () => { isRec = false; document.getElementById('micBtn').classList.remove('bg-red-500', 'pulse-red'); document.getElementById('micLabel').innerText = "おしてね"; };
            rec.onresult = (e) => { if(e.results[e.resultIndex].isFinal) sendText(e.results[e.resultIndex][0].transcript); };
        }
        function toggleSpeech() { if(!rec) return; isRec ? rec.stop() : rec.start(); }
        async function sendText(t) {
            try {
                const r = await fetch(`https://script.google.com/macros/s/AKfycbxxE14tNshFIqZHwzhyGQtRDeSazD9aPex9Tm0gIGJjmUvd8jAiFN-bkQyNIt_D9cV_/exec?text=${encodeURIComponent(t)}`);
                const d = await r.json();
                if(d.words_all) { currentWords.push(...d.words_all); renderEditor(); }
            } catch(e) {}
        }

        // その他
        function deleteText() { currentWords.pop(); renderEditor(); }
        function playVoice() { const u = new SpeechSynthesisUtterance(document.getElementById('kanjiDisplay').innerText || "なにかはなしてね"); u.lang='ja-JP'; window.speechSynthesis.speak(u); }
        function triggerPhoto() { document.getElementById('fileInput').click(); }
        document.getElementById('fileInput').onchange = (e) => {
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader(); r.readAsDataURL(f);
                r.onload = (ev) => {
                    const img = new Image(); img.src = ev.target.result;
                    img.onload = () => {
                        const c = document.createElement('canvas'); const m=400; let w=img.width, h=img.height;
                        if(w>h) { if(w>m){ h*=m/w; w=m; } } else { if(h>m){ w*=m/h; h=m; } }
                        c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
                        const src = c.toDataURL('image/jpeg', 0.6);
                        const imgTag = document.createElement('img'); imgTag.src = src; imgTag.className="photo-item";
                        document.getElementById('p-t5').appendChild(imgTag);
                    };
                };
            });
        };

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // 起動時
        window.onload = () => { refreshAll(); };
    </script>
</body>
</html>
