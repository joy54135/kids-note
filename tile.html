<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ふりかえり たからばこ v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .sketchbook { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
        .suck-in { transition: all 0.5s ease-in-out; transform: scale(0.9); opacity: 0; }
        .modal-bg { background-color: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        
        /* タイルデザイン */
        .tile { background: white; border: 4px solid #ffedd5; border-radius: 2rem; padding: 1rem; display: flex; flex-direction: column; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
        .tile:active { transform: scale(0.95); background: #fff7ed; }
        .tile-label { color: #fb923c; font-weight: 900; font-size: 0.8rem; margin-bottom: 0.5rem; }
        .tile-preview { flex: 1; font-weight: 900; color: #4b5563; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }

        /* 写真タイル */
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; height: 100%; width: 100%; }
        .photo-item { width: 100%; height: 100%; object-fit: cover; border-radius: 0.5rem; background: #f3f4f6; }

        /* エディタ画面（オーバーレイ） */
        #editorOverlay { position: fixed; inset: 0; background: #fffbeb; z-index: 500; display: none; flex-direction: column; padding: 1rem; }
        #richDisplay { caret-color: #38bdf8; outline: none; min-height: 100%; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body class="bg-amber-50 p-3 select-none">

    <div class="w-full max-w-3xl mx-auto flex justify-between items-center mb-4 shrink-0 relative z-10">
        <button id="historyBtn" class="bg-white border-2 border-orange-200 rounded-full px-5 py-2 shadow-sm active:scale-90 flex items-center gap-1">
            <span class="text-2xl">🎁</span> <span id="label-history" class="text-sm font-black text-orange-400 italic">きろく</span>
        </button>
        <h1 id="label-title" class="text-xl font-black text-orange-400 tracking-tighter text-center flex-1">ふりかえり たからばこ</h1>
        <select id="gradeMode" class="bg-orange-400 text-white font-black text-xs px-4 py-2 rounded-full border-2 border-white shadow-sm outline-none appearance-none">
            <option value="0">ひらがな</option>
            <option value="1" selected>1ねんせい</option>
            <option value="2">2ねんせい</option>
            <option value="3">3ねんせい</option>
            <option value="4">4ねんせい</option>
            <option value="5">5ねんせい</option>
            <option value="6">6ねんせい</option>
            <option value="99">ぜんぶ</option>
        </select>
    </div>

    <div id="mainGrid" class="flex-1 w-full max-w-3xl mx-auto grid grid-cols-2 grid-rows-[1fr_1fr_0.8fr] gap-4 mb-4">
        <div class="tile" onclick="openEditor('t1')">
            <div class="tile-label">めあて</div>
            <div id="p-t1" class="tile-preview text-2xl"></div>
        </div>
        <div class="tile" onclick="openEditor('t2')">
            <div class="tile-label">できたこと</div>
            <div id="p-t2" class="tile-preview text-2xl"></div>
        </div>
        <div class="tile" onclick="openEditor('t3')">
            <div class="tile-label">むずかしかったこと</div>
            <div id="p-t3" class="tile-preview text-2xl"></div>
        </div>
        <div class="tile" onclick="openEditor('t4')">
            <div class="tile-label">つぎのこと</div>
            <div id="p-t4" class="tile-preview text-2xl"></div>
        </div>
        <div class="tile col-span-2" onclick="triggerPhotoInput()">
            <div class="tile-label">しゃしん</div>
            <div id="p-t5" class="photo-grid"></div>
            <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
        </div>
    </div>

    <div id="mainActions" class="w-full max-w-3xl mx-auto flex gap-4">
        <button id="finalSaveBtn" class="flex-1 bg-orange-400 border-4 border-orange-100 rounded-2xl py-4 shadow-lg active:scale-95 text-white font-black text-xl">
            ぜんぶ ほぞんする 💰
        </button>
    </div>

    <div id="editorOverlay" class="sketchbook">
        <div class="flex justify-between items-center mb-4">
            <button onclick="closeEditor(false)" class="text-gray-400 font-bold text-lg">✖ やめる</button>
            <div id="editorTitle" class="text-orange-400 font-black">編集名</div>
            <button onclick="closeEditor(true)" class="bg-orange-400 text-white px-6 py-2 rounded-full font-black shadow-md">決定 ✅</button>
        </div>

        <div id="canvas" class="flex-1 bg-white rounded-3xl shadow-inner border-4 border-orange-100 p-6 mb-4 flex flex-col relative min-h-0">
            <div id="outputContainer" class="flex-1 overflow-y-auto min-h-0">
                 <div id="richDisplay" contenteditable="true" class="text-5xl font-black text-gray-700 leading-tight w-full"></div>
            </div>
            <div id="kanjiDisplay" class="shrink-0 w-full text-lg font-bold text-gray-300 border-t border-gray-100 pt-2 italic opacity-60"></div>
            <div id="preview" class="shrink-0 text-2xl font-bold text-sky-300 italic pointer-events-none mt-1"></div>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-4">
            <button id="micBtn" class="relative bg-sky-400 border-4 border-sky-100 rounded-2xl py-5 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <span id="label-mic" class="text-2xl font-black italic leading-none">おしてね</span>
                <span class="text-[10px] font-bold opacity-90 mt-1 uppercase tracking-tighter">Voice Input</span>
            </button>
            <button id="listenBtn" class="bg-green-400 border-4 border-green-100 rounded-2xl py-5 shadow-lg active:scale-95 flex flex-col items-center justify-center text-white">
                <span class="text-3xl mb-1">📢</span>
                <span class="text-xs font-black italic">きいてみる</span>
            </button>
            <button id="backspaceBtn" class="bg-white border-4 border-orange-100 rounded-2xl py-5 shadow-lg active:scale-95 flex flex-col items-center justify-center text-orange-400">
                <span class="text-3xl">⌫</span>
                <span class="text-xs font-black italic">1字けす</span>
            </button>
        </div>
    </div>

    <div id="photoViewerModal" class="hidden modal-bg flex-col" onclick="this.classList.add('hidden')">
        <div id="photoFullList" class="w-full max-w-4xl h-full flex flex-col items-center gap-8 overflow-y-auto p-8"></div>
    </div>

    <div id="confirmModal" class="hidden modal-bg">
        <div class="bg-white rounded-3xl p-10 w-full max-w-sm shadow-2xl text-center border-8 border-orange-100">
            <p id="confirmText" class="text-2xl font-black text-gray-700 mb-10 italic">ほぞんする？</p>
            <div class="flex gap-4">
                <button onclick="document.getElementById('confirmModal').classList.add('hidden')" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold text-gray-400">いいえ</button>
                <button id="execSave" class="flex-1 bg-orange-500 py-4 rounded-2xl font-black text-white shadow-lg">はい！</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxE14tNshFIqZHwzhyGQtRDeSazD9aPex9Tm0gIGJjmUvd8jAiFN-bkQyNIt_D9cV_/exec';
        
        // ステート管理
        let appState = {
            activeTileId: null,
            tiles: {
                t1: { conversation: [], kanjiText: "" },
                t2: { conversation: [], kanjiText: "" },
                t3: { conversation: [], kanjiText: "" },
                t4: { conversation: [], kanjiText: "" },
                t5: { images: [] }
            }
        };

        // 音響
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.08, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        }
        const sfx = { click: () => playSfx(600, 'sine', 0.1), pop: () => playSfx(400, 'sine', 0.1), save: () => playSfx(1000, 'sine', 0.5) };

        const KANJI_LISTS = { 1: "一右雨円王音下火花貝学気九休玉金空月犬見五口校左三山子四糸字耳七車手十出女小上森人水正生青夕石赤千川先早草足村大男竹中虫町天田土二日入年白八百文木本名目立力林六", 2: "引羽雲園遠何科夏家歌画回会海絵外角楽活間丸岩顔汽記帰弓牛魚京強教近兄形計元言原戸古午後語工公広交光考行高黄合谷国黒今才細作算止市矢姉思紙寺自時室社弱首秋週春書少場色食心新親図数西声星晴切雪船線前組走多太体台地池知茶昼長鳥朝直通弟店点電刀冬當東答頭同道読内南肉馬売買麦半番父風分聞米歩母方北毎妹万明鳴毛門夜野友用曜来里理話" };
        
        const ricDisplay = document.getElementById('richDisplay');
        const kanjiDisplay = document.getElementById('kanjiDisplay');
        const gradeMode = document.getElementById('gradeMode');

        // エディタを開く
        function openEditor(id) {
            sfx.pop();
            appState.activeTileId = id;
            const data = appState.tiles[id];
            document.getElementById('editorTitle').innerText = {t1:'めあて', t2:'できたこと', t3:'むずかしかった', t4:'つぎのこと'}[id];
            document.getElementById('editorOverlay').style.display = 'flex';
            
            // v51のグローバル変数をこのタイル用にセット
            currentConversation = [...data.conversation];
            currentKanjiText = data.kanjiText;
            renderDisplay();
        }

        // エディタを閉じる
        function closeEditor(save) {
            if (save) {
                appState.tiles[appState.activeTileId].conversation = [...currentConversation];
                appState.tiles[appState.activeTileId].kanjiText = currentKanjiText;
            }
            document.getElementById('editorOverlay').style.display = 'none';
            appState.activeTileId = null;
            sfx.click();
            renderTilePreviews();
        }

        // タイル上のプレビュー表示
        function renderTilePreviews() {
            const lv = parseInt(gradeMode.value);
            const allowed = (l) => { let s=""; for(let i=1;i<=l;i++) s+=KANJI_LISTS[i]||""; return s; }(lv);
            
            ['t1','t2','t3','t4'].forEach(id => {
                let html = "";
                appState.tiles[id].conversation.forEach(w => {
                    const furigana = w.furigana || w.surface;
                    if (lv === 0) html += furigana;
                    else if (lv === 99) html += w.surface;
                    else {
                        let canShow = true; for(let char of w.surface){ if((char >= '\u4e00' && char <= '\u9faf') && !allowed.includes(char)) canShow = false; }
                        html += canShow ? w.surface : furigana;
                    }
                });
                document.getElementById('p-'+id).innerHTML = html;
            });
            renderPhotoGrid();
        }

        // 写真グリッド表示
        function triggerPhotoInput() { sfx.click(); document.getElementById('fileInput').click(); }
        document.getElementById('fileInput').onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                if(appState.tiles.t5.images.length >= 4) return;
                const r = new FileReader();
                r.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const c = document.createElement('canvas'); const m = 600;
                        let w = img.width, h = img.height;
                        if(w>h) { if(w>m){ h*=m/w; w=m; } } else { if(h>m){ w*=m/h; h=m; } }
                        c.width = w; c.height = h; c.getContext('2d').drawImage(img,0,0,w,h);
                        appState.tiles.t5.images.push(c.toDataURL('image/jpeg', 0.7));
                        renderPhotoGrid();
                    };
                    img.src = ev.target.result;
                };
                r.readAsDataURL(file);
            });
        };

        function renderPhotoGrid() {
            const container = document.getElementById('p-t5');
            container.innerHTML = appState.tiles.t5.images.map(src => `<img src="${src}" class="photo-item" onclick="event.stopPropagation(); showFullPhoto('${src}')">`).join('');
        }

        function showFullPhoto(src) {
            const list = document.getElementById('photoFullList');
            list.innerHTML = `<img src="${src}" class="w-full rounded-3xl shadow-2xl border-4 border-white">`;
            document.getElementById('photoViewerModal').classList.remove('hidden');
        }

        // 音声入力ロジック (v51準拠)
        let currentConversation = []; let currentKanjiText = ""; let isRunning = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new SpeechRecognition(); rec.lang = 'ja-JP'; rec.interimResults = true;

        document.getElementById('micBtn').onclick = () => { sfx.click(); isRunning ? rec.stop() : rec.start(); };
        rec.onstart = () => { isRunning = true; document.getElementById('micBtn').classList.add('bg-red-500', 'pulse-red'); };
        rec.onend = () => { isRunning = false; document.getElementById('micBtn').classList.remove('bg-red-500', 'pulse-red'); };
        rec.onresult = (e) => {
            let final = ''; for (let i = e.resultIndex; i < e.results.length; i++) if (e.results[i].isFinal) final += e.results[i][0].transcript;
            if (final) sendToGas(final);
        };

        async function sendToGas(text) {
            try {
                const res = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}`);
                const d = await res.json();
                if (d.words_all) {
                    currentConversation.push(...d.words_all);
                    currentKanjiText = currentConversation.map(w => w.surface).join('');
                    renderDisplay();
                }
            } catch (e) {}
        }

        function renderDisplay() {
            const lv = parseInt(gradeMode.value);
            const allowed = (l) => { let s=""; for(let i=1;i<=l;i++) s+=KANJI_LISTS[i]||""; return s; }(lv);
            let html = "";
            currentConversation.forEach(w => {
                const furigana = w.furigana || w.surface;
                if (lv === 0) html += furigana;
                else if (lv === 99) html += w.surface;
                else {
                    let canShow = true; for(let char of w.surface){ if((char >= '\u4e00' && char <= '\u9faf') && !allowed.includes(char)) canShow = false; }
                    html += canShow ? w.surface : furigana;
                }
            });
            ricDisplay.innerHTML = html;
            kanjiDisplay.innerText = currentKanjiText;
        }

        document.getElementById('backspaceBtn').onclick = () => { sfx.click(); currentConversation.pop(); currentKanjiText = currentConversation.map(w => w.surface).join(''); renderDisplay(); };
        document.getElementById('listenBtn').onclick = () => { sfx.click(); const u = new SpeechSynthesisUtterance(currentKanjiText); u.lang = 'ja-JP'; window.speechSynthesis.speak(u); };

        // 最終保存
        document.getElementById('finalSaveBtn').onclick = () => {
            if(!appState.tiles.t1.kanjiText) { alert("めあて を かいてね"); return; }
            document.getElementById('confirmModal').classList.remove('hidden');
        };

        document.getElementById('execSave').onclick = () => {
            sfx.save();
            const hist = JSON.parse(localStorage.getItem('furiHistory') || '[]');
            const entry = {
                date: new Date().toLocaleString('ja-JP'),
                tiles: {...appState.tiles}
            };
            hist.unshift(entry);
            localStorage.setItem('furiHistory', JSON.stringify(hist));
            location.reload(); // リセット
        };

        gradeMode.onchange = () => { sfx.click(); renderTilePreviews(); if(appState.activeTileId) renderDisplay(); };

    </script>
</body>
</html>
